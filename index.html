<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/list.css">
  <link rel="stylesheet" href="css/player.css">
</head>
<body>

  <!-- ==================== LIST SCREEN ==================== -->
  <div id="screen-list" class="screen active">

    <div class="list-header">
      <h1 class="list-title">
        <i class="fa-solid fa-film"></i>
        Video Library
      </h1>
      <div class="list-header-actions">
        <button class="list-icon-btn" id="btn-add-file" title="Add Video">
          <i class="fa-solid fa-circle-plus"></i>
        </button>
        <button class="list-icon-btn" id="btn-open-tags" title="Edit Tags">
          <i class="fa-solid fa-tags"></i>
        </button>
      </div>
    </div>

    <div class="list-toolbar">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search by name or tag">
      </div>
      <div class="sort-wrap">
        <select id="sort-key" class="sort-select">
          <option value="date">Date Added</option>
          <option value="name">Name</option>
        </select>
        <button class="list-icon-btn" id="btn-sort-dir" title="Toggle Direction">
          <i class="fa-solid fa-arrow-down-wide-short" id="sort-dir-icon"></i>
        </button>
      </div>
    </div>

    <div class="tag-filter-bar" id="tag-filter-bar"></div>

    <div class="file-grid" id="file-grid"></div>

    <div class="empty-state" id="empty-state" hidden>
      <i class="fa-solid fa-film fa-3x"></i>
      <p>No videos yet</p>
      <p class="empty-sub">Tap <i class="fa-solid fa-circle-plus"></i> to add a video</p>
    </div>

    <input type="file" id="file-input" accept="video/*" hidden>
  </div>

  <!-- ==================== PLAYER SCREEN ==================== -->
  <div id="screen-player" class="screen">

    <div class="video-container">
      <video id="video" playsinline preload="metadata"></video>
    </div>

    <!-- Main UI Overlay -->
    <div class="player-ui" id="player-ui">

      <!-- Top Bar: [Back] [ProgressBar] [Play] -->
      <div class="player-top-bar">
        <button class="ctrl-btn" id="btn-back" title="Back to List">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="progress-wrap">
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="loop-bg"        id="loop-bg"></div>
            <div class="markers-layer"  id="markers-layer"></div>
            <div class="loop-ticks-layer" id="loop-ticks-layer"></div>
            <div class="progress-handle" id="progress-handle"></div>
          </div>
          <div class="time-row">
            <span id="time-cur">0:00</span>
            <span id="time-dur">0:00</span>
          </div>
        </div>
        <button class="ctrl-btn" id="btn-play" title="Play / Pause">
          <i class="fa-solid fa-play" id="play-icon"></i>
        </button>
      </div>

      <!-- Left Controls: below Back button -->
      <div class="player-left-ctrl">
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-bk3" title="-3 sec">
            <span class="num-icon"><i class="fa-solid fa-rotate-left"></i><span class="num-badge">3</span></span>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-fw3" title="+3 sec">
            <span class="num-icon"><i class="fa-solid fa-rotate-right"></i><span class="num-badge">3</span></span>
          </button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-bk5" title="-5 sec">
            <span class="num-icon"><i class="fa-solid fa-rotate-left"></i><span class="num-badge">5</span></span>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-fw5" title="+5 sec">
            <span class="num-icon"><i class="fa-solid fa-rotate-right"></i><span class="num-badge">5</span></span>
          </button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-mirror" title="Mirror (flip horizontal)">
            <i class="fa-solid fa-left-right"></i>
          </button>
        </div>
      </div>

      <!-- Right Controls: below Play button -->
      <div class="player-right-ctrl">

        <!-- Speed row -->
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-spd-dn" title="Speed -0.05">
            <i class="fa-solid fa-minus"></i>
          </button>
          <button class="ctrl-btn ctrl-sm ctrl-text" id="btn-spd-reset" title="Reset Speed">
            <span id="spd-label">1.00x</span>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-spd-up" title="Speed +0.05">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <!-- Marker row -->
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-mk-jump" title="Jump to Previous Marker">
            <i class="fa-solid fa-backward-step"></i>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-mk-set" title="Set Marker">
            <i class="fa-solid fa-bookmark"></i>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-mk-del" title="Delete Previous Marker">
            <i class="fa-regular fa-bookmark"></i>
          </button>
        </div>

        <!-- Loop row -->
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-lp-set" title="Set Loop Start / End">
            <i class="fa-solid fa-repeat"></i>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-lp-toggle" title="Toggle Loop On / Off">
            <i class="fa-solid fa-circle-play"></i>
          </button>
          <button class="ctrl-btn ctrl-sm" id="btn-lp-del" title="Delete Loop">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- UI Hide row -->
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-sm" id="btn-ui-hide" title="Hide UI">
            <i class="fa-solid fa-eye-slash"></i>
          </button>
        </div>
      </div>

    </div><!-- /player-ui -->

    <!-- UI-hidden mode: only show button is visible -->
    <button class="ctrl-btn ui-show-btn" id="btn-ui-show" title="Show UI" hidden>
      <i class="fa-solid fa-eye"></i>
    </button>

  </div><!-- /screen-player -->


  <!-- ==================== MODALS ==================== -->

  <!-- Tag Management Modal -->
  <div class="modal-overlay" id="modal-tags" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Tags</h2>
        <button class="list-icon-btn" id="btn-close-tags" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="add-tag-row">
          <input type="text"  id="new-tag-name"  class="text-input flex-1" placeholder="New tag name">
          <input type="color" id="new-tag-color" class="color-input" value="#4a90e2">
          <button class="list-icon-btn accent-btn" id="btn-add-tag" title="Add Tag">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div class="tag-edit-list" id="tag-edit-list"></div>
      </div>
    </div>
  </div>

  <!-- Name Edit Modal -->
  <div class="modal-overlay" id="modal-name" hidden>
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Edit Name</h2>
        <button class="list-icon-btn" id="btn-close-name" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <input type="text" id="name-edit-input" class="text-input" placeholder="Display name">
        <button class="primary-btn" id="btn-save-name">
          <i class="fa-solid fa-check"></i> Save
        </button>
      </div>
    </div>
  </div>

  <!-- Tag Assign Modal -->
  <div class="modal-overlay" id="modal-tag-assign" hidden>
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Assign Tags</h2>
        <button class="list-icon-btn" id="btn-close-tag-assign" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="tag-assign-list" id="tag-assign-list"></div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" hidden>
    <div class="loading-box">
      <div class="spinner"></div>
      <p class="loading-msg" id="loading-msg">Loading...</p>
      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/tags.js"></script>
  <script src="js/list.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
