<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>読み取り範囲設定 - プロセカ リザルト管理</title>
    <!--
      読み取り設定は index.html 内のモーダルに統合されました。
      (別ページに遷移するとログイン状態が失われてしまう問題があったため)
      このファイルは、旧ブックマークや旧リンクからのアクセス用に残してある
      リダイレクト専用ページです。
    -->
    <script>
      location.replace('index.html?openSettings=1');
    </script>
  </head>
  <body>
    <noscript>
      読み取り設定は index.html に統合されました。
      <a href="index.html?openSettings=1">こちらをクリックしてください。</a>
    </noscript>
    <p>読み取り設定は index.html に統合されました。移動中です…<br>
      移動しない場合は <a href="index.html?openSettings=1">こちらをクリックしてください。</a>
    </p>
  </body>
</html>
