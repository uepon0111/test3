<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鉄道シミュレーター</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN',
                   'Hiragino Sans', Meiryo, sans-serif;
      background: #fff;
      color: #1f2937;
      height: 100dvh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ================================================================
       LAYOUT
    ================================================================ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* --- Map area --- */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f0f2f5;
      min-height: 0;
    }

    #map-canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: grab;
      touch-action: none;
    }
    #map-canvas.mode-place  { cursor: crosshair; }
    #map-canvas.mode-draw   { cursor: crosshair; }
    #map-canvas.mode-select { cursor: default; }
    #map-canvas.grabbing    { cursor: grabbing; }

    /* --- Bottom panel --- */
    #bottom-panel {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-top: 2px solid #e5e7eb;
      flex-shrink: 0;
    }

    @media (orientation: landscape) { #bottom-panel { height: 260px; } }
    @media (orientation: portrait)  { #bottom-panel { height: 48dvh; } }

    /* ================================================================
       TAB BAR
    ================================================================ */
    #tab-bar {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 7px 4px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 10px;
      color: #6b7280;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s, background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn i { font-size: 15px; }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    .tab-btn:hover:not(.active) { color: #374151; background: #f9fafb; }

    /* ================================================================
       TAB PANELS
    ================================================================ */
    #tab-content {
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .tab-panel {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .tab-panel.active { display: flex; }

    .panel-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
      flex-shrink: 0;
      background: #fafafa;
      min-height: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      min-height: 0;
    }

    /* ================================================================
       BUTTONS
    ================================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #374151;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s, border-color .1s, color .1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.4;
    }
    .btn:hover:not(:disabled) { background: #f3f4f6; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }

    .btn-danger  { background: #ef4444; border-color: #ef4444; color: #fff; }
    .btn-danger:hover:not(:disabled)  { background: #dc2626; }

    .btn-sm { padding: 4px 8px; font-size: 11px; }

    .btn-icon { padding: 5px 9px; }

    .btn.active {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
    }

    /* ================================================================
       FORMS
    ================================================================ */
    label { font-size: 12px; color: #6b7280; }

    input[type="text"],
    input[type="number"],
    select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 7px;
      font-size: 12px;
      color: #1f2937;
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px #dbeafe;
    }
    input[type="color"] {
      width: 34px; height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      cursor: pointer;
      padding: 2px;
      background: #fff;
    }

    /* ================================================================
       STATION TAB
    ================================================================ */
    #station-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .station-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
      transition: border-color .15s, background .1s;
    }
    .station-item:hover   { border-color: #93c5fd; background: #f8fbff; }
    .station-item.selected { border-color: #2563eb; background: #eff6ff; }

    .station-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .station-name-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: #1f2937;
      outline: none;
      min-width: 0;
    }
    .station-name-input:focus {
      outline: 1px solid #2563eb;
      border-radius: 3px;
      background: #fff;
      padding: 0 4px;
    }

    .station-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ================================================================
       TRACK TAB
    ================================================================ */
    .mode-group {
      display: flex;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-group .btn {
      border: none;
      border-radius: 0;
      border-right: 1px solid #d1d5db;
    }
    .mode-group .btn:last-child { border-right: none; }

    #track-info {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }

    /* ================================================================
       TIMETABLE TAB
    ================================================================ */
    .tt-layout {
      display: flex;
      gap: 0;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .tt-sidebar {
      width: 170px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e5e7eb;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    #train-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .train-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color .15s, background .1s;
      background: #fafafa;
    }
    .train-item:hover   { border-color: #93c5fd; background: #f8fbff; }
    .train-item.selected { border-color: #2563eb; background: #eff6ff; }

    .train-color-swatch {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .train-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Schedule editor (right pane) */
    .tt-editor {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      min-width: 0;
    }

    .sched-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .sched-header input[type="text"] { width: 130px; }

    /* Schedule stop list */
    .sched-list {
      display: flex;
      flex-direction: column;
    }

    .sched-row {
      display: flex;
      gap: 0;
    }

    /* Vertical line */
    .sched-line-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 32px;
      flex-shrink: 0;
    }
    .sched-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #fff;
      flex-shrink: 0;
      z-index: 1;
    }
    .sched-dot.station  { background: #2563eb; }
    .sched-dot.junction { background: #f59e0b; }
    .sched-dot.endpoint { background: #10b981; }

    .sched-vline {
      width: 2px;
      flex: 1;
      background: #d1d5db;
      min-height: 8px;
    }

    /* Stop content */
    .sched-content {
      flex: 1;
      padding: 0 0 12px 8px;
      min-width: 0;
    }

    .sched-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sched-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 10px;
      align-items: center;
    }

    .sched-field {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .sched-field label { color: #9ca3af; white-space: nowrap; }

    .time-input-group {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .time-input-group select { width: 52px; font-size: 11px; padding: 2px 4px; }

    .sched-stop-pass { opacity: .6; }

    .badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-amber{ background: #fef3c7; color: #b45309; }
    .badge-green{ background: #d1fae5; color: #047857; }
    .badge-gray { background: #f3f4f6; color: #374151; }
    .badge-red  { background: #fee2e2; color: #dc2626; }

    /* ================================================================
       SIMULATION TAB
    ================================================================ */
    .sim-toolbar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #sim-time-display {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
      color: #1f2937;
    }

    .speed-group {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .speed-btn {
      padding: 3px 7px;
      font-size: 11px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #374151;
      transition: background .1s, color .1s;
    }
    .speed-btn:hover  { background: #f3f4f6; }
    .speed-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    #sim-train-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }
    #sim-train-table th {
      text-align: left;
      padding: 4px 8px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      color: #6b7280;
    }
    #sim-train-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #f3f4f6;
    }

    /* ================================================================
       MAP OVERLAY
    ================================================================ */
    #map-overlay-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
    }
    #map-overlay-toolbar .btn {
      padding: 7px 9px;
      box-shadow: 0 1px 5px rgba(0,0,0,.18);
      font-size: 14px;
    }

    #map-io-toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 5px;
      z-index: 10;
    }
    #map-io-toolbar .btn {
      box-shadow: 0 1px 5px rgba(0,0,0,.15);
      font-size: 11px;
    }

    #map-zoom-info {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 11px;
      color: #4b5563;
      background: rgba(255,255,255,.88);
      padding: 3px 7px;
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    #map-cursor-info {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 11px;
      color: #4b5563;
      background: rgba(255,255,255,.88);
      padding: 3px 7px;
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    /* ================================================================
       MODAL
    ================================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      min-width: 280px;
      max-width: 92vw;
      max-height: 88dvh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
    }
    .modal-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .modal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .modal-row label { min-width: 80px; }

    /* ================================================================
       MISC
    ================================================================ */
    .divider-v {
      width: 1px;
      height: 22px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .text-muted { color: #9ca3af; font-size: 12px; }
    .text-sm    { font-size: 12px; }
    .fw-bold    { font-weight: 700; }
    .mt-2       { margin-top: 8px; }
    .mt-3       { margin-top: 12px; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* Hidden file input */
    #import-file-input { display: none; }
  </style>
</head>
<body>
<div id="app">

  <!-- ============================================================
       MAP AREA
  ============================================================ -->
  <div id="map-container">
    <canvas id="map-canvas"></canvas>

    <!-- Zoom toolbar (top-right) -->
    <div id="map-overlay-toolbar">
      <button class="btn btn-icon" id="btn-zoom-in"    title="拡大"><i class="fa-solid fa-plus"></i></button>
      <button class="btn btn-icon" id="btn-zoom-out"   title="縮小"><i class="fa-solid fa-minus"></i></button>
      <button class="btn btn-icon" id="btn-zoom-reset" title="全体表示"><i class="fa-solid fa-expand"></i></button>
    </div>

    <!-- I/O toolbar (top-left) -->
    <div id="map-io-toolbar">
      <button class="btn btn-sm" id="btn-export"><i class="fa-solid fa-file-export"></i> 書き出し</button>
      <button class="btn btn-sm" id="btn-import"><i class="fa-solid fa-file-import"></i> 読み込み</button>
      <input type="file" id="import-file-input" accept=".json">
    </div>

    <!-- Zoom info (bottom-left) -->
    <div id="map-zoom-info">ズーム: <span id="zoom-label">100%</span></div>
    <!-- Cursor pos (bottom-right) -->
    <div id="map-cursor-info" id="cursor-label"></div>
  </div><!-- /map-container -->

  <!-- ============================================================
       BOTTOM PANEL
  ============================================================ -->
  <div id="bottom-panel">

    <!-- TAB BAR -->
    <div id="tab-bar">
      <button class="tab-btn active" data-tab="station">
        <i class="fa-solid fa-location-dot"></i><span>駅配置</span>
      </button>
      <button class="tab-btn" data-tab="track">
        <i class="fa-solid fa-route"></i><span>配線</span>
      </button>
      <button class="tab-btn" data-tab="timetable">
        <i class="fa-solid fa-calendar-days"></i><span>ダイヤ設定</span>
      </button>
      <button class="tab-btn" data-tab="simulation">
        <i class="fa-solid fa-circle-play"></i><span>実行</span>
      </button>
    </div>

    <!-- TAB CONTENT -->
    <div id="tab-content">

      <!-- ======================================================
           STATION TAB
      ====================================================== -->
      <div class="tab-panel active" id="panel-station">
        <div class="panel-toolbar">
          <button class="btn btn-primary btn-sm" id="btn-mode-place-station">
            <i class="fa-solid fa-plus"></i> 駅を追加
          </button>
          <button class="btn btn-sm" id="btn-station-orient" disabled title="向きを変更">
            <i class="fa-solid fa-arrows-rotate"></i> 向き変更
          </button>
          <button class="btn btn-danger btn-sm" id="btn-delete-station" disabled>
            <i class="fa-solid fa-trash"></i> 削除
          </button>
          <div class="divider-v"></div>
          <span class="text-muted" id="station-mode-hint">「駅を追加」→マップをクリックして配置</span>
        </div>
        <div class="panel-body">
          <div id="station-list">
            <p class="text-muted" id="station-empty-msg">駅がまだありません。「駅を追加」を押してマップ上に配置してください。</p>
          </div>
        </div>
      </div>

      <!-- ======================================================
           TRACK TAB
      ====================================================== -->
      <div class="tab-panel" id="panel-track">
        <div class="panel-toolbar">
          <div class="mode-group">
            <button class="btn btn-sm active" id="btn-track-draw" data-mode="draw">
              <i class="fa-solid fa-pen"></i> 線路を引く
            </button>
            <button class="btn btn-sm" id="btn-track-select" data-mode="select">
              <i class="fa-solid fa-arrow-pointer"></i> 選択
            </button>
          </div>
          <div class="divider-v"></div>
          <button class="btn btn-danger btn-sm" id="btn-delete-track" disabled>
            <i class="fa-solid fa-trash"></i> 削除
          </button>
          <div class="divider-v"></div>
          <label for="travel-time-input">1マス所要時間:</label>
          <input type="number" id="travel-time-input" value="2" min="0.1" max="999" step="0.1" style="width:56px">
          <span class="text-muted">分</span>
        </div>
        <div class="panel-body">
          <p class="text-muted">始点をクリックし、連続して次の隣接点をクリックで線路を延ばします。右クリックまたはESCでキャンセル。3本の線路が交わると自動的に分岐になります。</p>
          <div id="track-error-msg" style="display:none;color:#dc2626;font-size:12px;margin-top:6px;padding:5px 8px;background:#fee2e2;border-radius:5px;border:1px solid #fca5a5"></div>
          <div id="track-info" class="mt-2"></div>
        </div>
      </div>

      <!-- ======================================================
           TIMETABLE TAB
      ====================================================== -->
      <div class="tab-panel" id="panel-timetable">
        <div class="panel-toolbar">
          <button class="btn btn-primary btn-sm" id="btn-add-train">
            <i class="fa-solid fa-plus"></i> 列車を追加
          </button>
          <button class="btn btn-danger btn-sm" id="btn-delete-train" disabled>
            <i class="fa-solid fa-trash"></i> 削除
          </button>
        </div>
        <div class="tt-layout panel-body" style="padding:0">
          <!-- Left: train list -->
          <div class="tt-sidebar">
            <div id="train-list">
              <p class="text-muted" style="font-size:11px" id="train-empty-msg">列車がありません</p>
            </div>
          </div>
          <!-- Right: schedule editor -->
          <div class="tt-editor" id="tt-editor">
            <p class="text-muted" id="tt-empty-msg">左の一覧から列車を選択してください</p>
            <div id="schedule-editor"></div>
          </div>
        </div>
      </div>

      <!-- ======================================================
           SIMULATION TAB
      ====================================================== -->
      <div class="tab-panel" id="panel-simulation">
        <div class="panel-toolbar" style="flex-direction:column;align-items:flex-start;gap:8px">
          <div class="sim-toolbar-row">
            <span id="sim-time-display">0:00</span>
            <button class="btn btn-primary btn-icon" id="btn-play"  title="再生">
              <i class="fa-solid fa-play"></i>
            </button>
            <button class="btn btn-icon" id="btn-stop" title="停止">
              <i class="fa-solid fa-stop"></i>
            </button>
            <div class="divider-v"></div>
            <label>開始時刻:</label>
            <div class="time-input-group">
              <select id="sim-start-h" style="width:58px"></select>
              <span style="font-size:13px;font-weight:700">:</span>
              <select id="sim-start-m" style="width:58px"></select>
            </div>
            <button class="btn btn-sm" id="btn-set-time"><i class="fa-solid fa-clock-rotate-left"></i> 設定</button>
          </div>
          <div class="sim-toolbar-row">
            <label>倍速:</label>
            <div class="speed-group" id="speed-group"></div>
          </div>
        </div>
        <div class="panel-body">
          <table id="sim-train-table">
            <thead>
              <tr>
                <th>列車</th>

<script>
/* ================================================================
   PART 1: CONSTANTS, STATE, UTILITIES, STORAGE
================================================================ */

'use strict';

// ----------------------------------------------------------------
// CONSTANTS
// ----------------------------------------------------------------
const GRID_PX       = 48;          // px per grid cell at zoom=1
const MIN_ZOOM      = 0.15;
const MAX_ZOOM      = 4.0;
const ZOOM_STEP     = 0.15;
const SQRT2         = Math.SQRT2;
const STORAGE_KEY   = 'railsim_v2';
const SPEED_STEPS   = [1, 2, 5, 10, 30, 60, 120, 300];
const TRAIN_COLORS  = [
  '#e53e3e','#dd6b20','#d69e2e','#38a169',
  '#2b6cb0','#805ad5','#d53f8c','#2c7a7b'
];

// ----------------------------------------------------------------
// MASTER STATE
// ----------------------------------------------------------------
const state = {
  /* Persisted */
  stations:          [],   // StationObj[]
  tracks:            [],   // TrackObj[]
  trains:            [],   // TrainObj[]
  travelTimePerGrid: 2,    // minutes (straight 1-grid unit)

  /* Runtime (not persisted) */
  viewport: { offsetX: 0, offsetY: 0, zoom: 1 },
  sim: {
    running:     false,
    currentTime: 0,      // seconds from midnight
    speed:       1,
    lastTs:      null,
    animId:      null,
  },
};

/*
  StationObj {
    id:          string
    name:        string
    gridX:       int        (top-left grid coord)
    gridY:       int
    platforms:   int        (1..10)
    orientation: 'vertical' | 'horizontal'
  }

  TrackObj {
    id:  string
    x1:  int   (grid coord)
    y1:  int
    x2:  int
    y2:  int
    // x2-x1, y2-y1 each in {-1,0,1}, not both 0
  }

  TrainObj {
    id:             string
    name:           string
    color:          string   (CSS hex)
    originStationId:string
    repeatInterval: int      (minutes)
    stops:          StopObj[]   // ordered list including stations AND junctions
  }

  StopObj {
    type:              'station' | 'junction'
    // if station:
    stationId?:        string
    stopMode?:         'stop' | 'pass'
    arrivalTime?:      int   (minutes from midnight)
    departureTime?:    int
    platform?:         int   (0-based index)
    // if junction:
    nodeKey?:          string  "x,y"
    arrivalTime?:      int
    direction?:        int   (index into junction's exits, 0=straight, 1=branch1)
  }
*/

// ----------------------------------------------------------------
// DERIVED: Node map  (rebuilt whenever tracks change)
// ----------------------------------------------------------------
// nodeMap["x,y"] = { x, y, trackIds: string[] }
let nodeMap = {};

function recomputeNodeMap() {
  nodeMap = {};
  for (const t of state.tracks) {
    _addNodeEntry(t.x1, t.y1, t.id);
    _addNodeEntry(t.x2, t.y2, t.id);
  }
}

function _addNodeEntry(x, y, trackId) {
  const k = nk(x, y);
  if (!nodeMap[k]) nodeMap[k] = { x, y, trackIds: [] };
  if (!nodeMap[k].trackIds.includes(trackId))
    nodeMap[k].trackIds.push(trackId);
}

// ----------------------------------------------------------------
// UI STATE  (not persisted)
// ----------------------------------------------------------------
let activeTab       = 'station';
let selectedStationId = null;
let selectedTrackId   = null;
let selectedTrainId   = null;

// Station placement
let placingStation  = false;   // true while waiting for map click

// Track drawing
let trackMode       = 'draw';  // 'draw' | 'select'
let drawStart       = null;    // {x,y} grid coords of first click, or null

// Map drag
let isDragging      = false;
let dragStart       = { x: 0, y: 0 };
let dragOrigin      = { x: 0, y: 0 };

// Station drag
let draggingStation = null;    // {id, startGX, startGY, mouseStartX, mouseStartY}

// Pending station (waiting for modal confirm)
let pendingStation  = null;    // {gridX, gridY}

// Pending train modal
let pendingTrainMode = null;   // 'add' | 'edit'

// Touch gesture
let lastTouchDist   = null;
let lastTouchMid    = null;

// ----------------------------------------------------------------
// UTILITY: ID
// ----------------------------------------------------------------
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ----------------------------------------------------------------
// UTILITY: Node key
// ----------------------------------------------------------------
function nk(x, y) { return `${x},${y}`; }

function parseNk(k) {
  const [x, y] = k.split(',').map(Number);
  return { x, y };
}

// ----------------------------------------------------------------
// UTILITY: Grid distance (accounts for diagonal = sqrt2)
// ----------------------------------------------------------------
function gridDist(x1, y1, x2, y2) {
  const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1);
  return (dx === 1 && dy === 1) ? SQRT2 : Math.max(dx, dy);
}

// ----------------------------------------------------------------
// UTILITY: Travel time for one track segment (minutes)
// ----------------------------------------------------------------
function trackTravelTime(track) {
  return gridDist(track.x1, track.y1, track.x2, track.y2)
       * state.travelTimePerGrid;
}

// ----------------------------------------------------------------
// UTILITY: Minutes -> "H:MM"
// ----------------------------------------------------------------
function fmtTime(min) {
  if (min == null || isNaN(min)) return '--:--';
  const h = Math.floor(min / 60);
  const m = Math.floor(min % 60);
  return `${h}:${String(m).padStart(2, '0')}`;
}

// ----------------------------------------------------------------
// UTILITY: Seconds -> "H:MM:SS"
// ----------------------------------------------------------------
function fmtTimeSec(sec) {
  const s = Math.floor(sec);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return `${h}:${String(m).padStart(2, '0')}`;
}

// ----------------------------------------------------------------
// UTILITY: Build <select> options for hours (0..47) and minutes
// ----------------------------------------------------------------
function populateTimeSelect(sel, max, step = 1) {
  sel.innerHTML = '';
  for (let i = 0; i <= max; i += step) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = String(i).padStart(2, '0');
    sel.appendChild(o);
  }
}

// ----------------------------------------------------------------
// STATION GEOMETRY HELPERS
// ----------------------------------------------------------------

/**
 * Returns array of endpoint objects for a station's track connections.
 * Each endpoint: { x, y, platformIndex (0-based), side }
 *
 * Vertical orientation (default):
 *   Station occupies grid cols [gx .. gx+2], rows [gy .. gy+platforms-1]
 *   Left  endpoints: (gx,    gy+i) for i=0..platforms-1   side='left'
 *   Right endpoints: (gx+2,  gy+i) for i=0..platforms-1   side='right'
 *
 * Horizontal orientation:
 *   Station occupies grid rows [gy .. gy+2], cols [gx .. gx+platforms-1]
 *   Top    endpoints: (gx+i, gy)   for i=0..platforms-1   side='top'
 *   Bottom endpoints: (gx+i, gy+2) for i=0..platforms-1   side='bottom'
 */
function stationEndpoints(s) {
  const eps = [];
  if (s.orientation === 'horizontal') {
    for (let i = 0; i < s.platforms; i++) {
      eps.push({ x: s.gridX + i, y: s.gridY,     platformIndex: i, side: 'top' });
      eps.push({ x: s.gridX + i, y: s.gridY + 2, platformIndex: i, side: 'bottom' });
    }
  } else {
    for (let i = 0; i < s.platforms; i++) {
      eps.push({ x: s.gridX,     y: s.gridY + i, platformIndex: i, side: 'left' });
      eps.push({ x: s.gridX + 2, y: s.gridY + i, platformIndex: i, side: 'right' });
    }
  }
  return eps;
}

/**
 * Bounding box of a station in grid units: {x, y, w, h}
 * (x,y) = top-left, w/h = number of grid cells spanned
 */
function stationBounds(s) {
  if (s.orientation === 'horizontal') {
    return { x: s.gridX, y: s.gridY, w: s.platforms, h: 2 };
  }
  return { x: s.gridX, y: s.gridY, w: 2, h: s.platforms };
}

/**
 * Returns the station that "owns" a given grid point as an endpoint,
 * or null if none.
 */
function stationAtEndpoint(x, y) {
  for (const s of state.stations) {
    if (stationEndpoints(s).some(ep => ep.x === x && ep.y === y)) return s;
  }
  return null;
}

/**
 * Returns the station whose body contains (x,y) (not just endpoints).
 */
function stationContaining(x, y) {
  for (const s of state.stations) {
    const b = stationBounds(s);
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return s;
  }
  return null;
}

/**
 * Endpoint object for a given (x,y) within a specific station.
 */
function endpointAt(s, x, y) {
  return stationEndpoints(s).find(ep => ep.x === x && ep.y === y) || null;
}

// ----------------------------------------------------------------
// NODE TYPE
// ----------------------------------------------------------------
function nodeType(x, y) {
  const n = nodeMap[nk(x, y)];
  if (!n || n.trackIds.length === 0) return 'empty';
  const c = n.trackIds.length;
  if (c === 1) return 'endpoint';
  if (c === 2) return 'pass';
  return 'junction';   // 3+
}

function isJunction(x, y) {
  return nodeType(x, y) === 'junction';
}

// ----------------------------------------------------------------
// GRAPH: Given arrival at (x,y) via incomingTrackId,
//        return outgoing track options [{trackId, toX, toY}]
// ----------------------------------------------------------------
function getExits(x, y, incomingTrackId) {
  const n = nodeMap[nk(x, y)];
  if (!n) return [];
  return n.trackIds
    .filter(tid => tid !== incomingTrackId)
    .map(tid => {
      const t = state.tracks.find(tr => tr.id === tid);
      if (!t) return null;
      if (t.x1 === x && t.y1 === y) return { trackId: tid, toX: t.x2, toY: t.y2, track: t };
      return { trackId: tid, toX: t.x1, toY: t.y1, track: t };
    })
    .filter(Boolean);
}

// ----------------------------------------------------------------
// GRAPH: Determine "straight" exit from a junction
//        (exit that is collinear with the incoming direction)
// ----------------------------------------------------------------
function getStraightExit(fromX, fromY, viaX, viaY, exits) {
  const dx = viaX - fromX, dy = viaY - fromY;
  // straight = same direction
  for (const ex of exits) {
    const ex_dx = ex.toX - viaX, ex_dy = ex.toY - viaY;
    if (Math.sign(ex_dx) === Math.sign(dx) && Math.sign(ex_dy) === Math.sign(dy)) return ex;
  }
  return exits[0] || null;
}

// ----------------------------------------------------------------
// GRAPH: BFS / route finder
// Find ordered route from a starting endpoint, honoring junction choices.
// Returns array of route nodes:
//   { type:'station'|'junction'|'endpoint', x, y, stationId?, nodeKey }
// ----------------------------------------------------------------
function findRoute(startStationId, startSide, junctionChoices) {
  // junctionChoices: { [nodeKey]: 'straight' | 'branch' }
  const startStation = state.stations.find(s => s.id === startStationId);
  if (!startStation) return [];

  // Find entry point: depends on side
  // We'll explore from each endpoint of the start station
  // For simplicity, we start from the endpoints on the "exit" side
  // The starting endpoint's outgoing track determines the route

  const eps = stationEndpoints(startStation);
  if (!eps.length) return [];

  const route = [];
  const visited = new Set();

  // Start from the first endpoint that has a track connected
  let startEp = null;
  let startTrackId = null;
  for (const ep of eps) {
    const n = nodeMap[nk(ep.x, ep.y)];
    if (n && n.trackIds.length > 0) {
      startEp = ep;
      startTrackId = n.trackIds[0];
      break;
    }
  }
  if (!startEp) return [];

  // Trace forward
  route.push({
    type: 'station',
    x: startEp.x, y: startEp.y,
    stationId: startStationId,
    nodeKey: nk(startEp.x, startEp.y)
  });

  let curX = startEp.x, curY = startEp.y;
  let incomingTrackId = null;

  // Move to the other end of startTrack
  const t0 = state.tracks.find(tr => tr.id === startTrackId);
  if (!t0) return route;
  let nextX = (t0.x1 === curX && t0.y1 === curY) ? t0.x2 : t0.x1;
  let nextY = (t0.x1 === curX && t0.y1 === curY) ? t0.y2 : t0.y1;
  incomingTrackId = startTrackId;
  curX = nextX; curY = nextY;

  for (let i = 0; i < 200; i++) {
    const key = nk(curX, curY);
    if (visited.has(key)) break;
    visited.add(key);

    // Is this a station endpoint?
    const atStation = stationAtEndpoint(curX, curY);
    if (atStation) {
      route.push({
        type: 'station',
        x: curX, y: curY,
        stationId: atStation.id,
        nodeKey: key
      });
      // Don't continue through station automatically – stop here
      break;
    }

    const exits = getExits(curX, curY, incomingTrackId);
    if (exits.length === 0) {
      // Dead end
      route.push({ type: 'endpoint', x: curX, y: curY, nodeKey: key });
      break;
    }

    if (exits.length === 1) {
      // Passthrough – keep going
      const ex = exits[0];
      incomingTrackId = ex.trackId;
      curX = ex.toX; curY = ex.toY;
    } else {
      // Junction
      route.push({ type: 'junction', x: curX, y: curY, nodeKey: key });
      // Choose direction
      const choice = junctionChoices[key] || 'straight';
      let chosen;
      if (choice === 'straight') {
        chosen = getStraightExit(/* prevX */ null, /* prevY */ null, curX, curY, exits);
        // Actually we need the incoming direction
        const prevTrack = state.tracks.find(tr => tr.id === incomingTrackId);
        if (prevTrack) {
          const prevX = (prevTrack.x2 === curX && prevTrack.y2 === curY) ? prevTrack.x1 : prevTrack.x2;
          const prevY = (prevTrack.x2 === curX && prevTrack.y2 === curY) ? prevTrack.y1 : prevTrack.y2;
          chosen = getStraightExit(prevX, prevY, curX, curY, exits) || exits[0];
        } else {
          chosen = exits[0];
        }
      } else {
        // branch: pick the non-straight one
        const prevTrack = state.tracks.find(tr => tr.id === incomingTrackId);
        if (prevTrack) {
          const straight = getStraightExit(
            (prevTrack.x2 === curX && prevTrack.y2 === curY) ? prevTrack.x1 : prevTrack.x2,
            (prevTrack.x2 === curX && prevTrack.y2 === curY) ? prevTrack.y1 : prevTrack.y2,
            curX, curY, exits
          );
          chosen = exits.find(ex => ex !== straight) || exits[0];
        } else {
          chosen = exits[0];
        }
      }
      if (!chosen) break;
      incomingTrackId = chosen.trackId;
      curX = chosen.toX; curY = chosen.toY;
    }
  }

  return route;
}

// ----------------------------------------------------------------
// STORAGE: Save / Load
// ----------------------------------------------------------------
function stateToJSON() {
  return {
    stations:          state.stations,
    tracks:            state.tracks,
    trains:            state.trains,
    travelTimePerGrid: state.travelTimePerGrid,
  };
}

function applyJSON(data) {
  state.stations          = data.stations          || [];
  state.tracks            = data.tracks            || [];
  state.trains            = data.trains            || [];
  state.travelTimePerGrid = data.travelTimePerGrid ?? 2;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stateToJSON()));
  } catch(e) { /* quota exceeded – ignore */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    applyJSON(JSON.parse(raw));
    return true;
  } catch(e) { return false; }
}

function exportData() {
  const json  = JSON.stringify(stateToJSON(), null, 2);
  const blob  = new Blob([json], { type: 'application/json' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = '鉄道シミュレーター.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      applyJSON(JSON.parse(e.target.result));
      recomputeNodeMap();
      saveState();
      renderAll();
      renderStationTab();
      renderTrackTab();
      renderTrainList();
    } catch(_) {
      alert('読み込みに失敗しました。形式が正しいか確認してください。');
    }
  };
  reader.readAsText(file);
}

// ----------------------------------------------------------------
// CANVAS COORDINATE HELPERS
// ----------------------------------------------------------------

/** Grid coords → canvas pixel coords (canvas-space, before DPR scaling) */
function gridToCanvas(gx, gy) {
  return {
    x: gx * GRID_PX * state.viewport.zoom + state.viewport.offsetX,
    y: gy * GRID_PX * state.viewport.zoom + state.viewport.offsetY,
  };
}

/** Canvas pixel coords → grid coords (float) */
function canvasToGrid(cx, cy) {
  return {
    x: (cx - state.viewport.offsetX) / (GRID_PX * state.viewport.zoom),
    y: (cy - state.viewport.offsetY) / (GRID_PX * state.viewport.zoom),
  };
}

/** Canvas pixel coords → nearest integer grid coords */
function snapToGrid(cx, cy) {
  const g = canvasToGrid(cx, cy);
  return { x: Math.round(g.x), y: Math.round(g.y) };
}

/** Is a grid point visible in the canvas viewport? */
function isGridPointVisible(gx, gy, w, h) {
  const c = gridToCanvas(gx, gy);
  const pad = GRID_PX * state.viewport.zoom * 2;
  return c.x > -pad && c.x < w + pad
      && c.y > -pad && c.y < h + pad;
}

/** Track segment visible? (crude bbox check) */
function isTrackVisible(t, w, h) {
  const pad = GRID_PX * state.viewport.zoom * 2;
  const p1 = gridToCanvas(t.x1, t.y1);
  const p2 = gridToCanvas(t.x2, t.y2);
  const minX = Math.min(p1.x, p2.x), maxX = Math.max(p1.x, p2.x);
  const minY = Math.min(p1.y, p2.y), maxY = Math.max(p1.y, p2.y);
  return maxX > -pad && minX < w + pad && maxY > -pad && minY < h + pad;
}

// ----------------------------------------------------------------
// VALIDATION: Check if a new track can be placed
// ----------------------------------------------------------------
function canPlaceTrack(x1, y1, x2, y2) {
  // Must be adjacent (8-direction, step 1)
  const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1);
  if (dx > 1 || dy > 1 || (dx === 0 && dy === 0)) return false;

  // No duplicate
  if (state.tracks.some(t =>
    (t.x1 === x1 && t.y1 === y1 && t.x2 === x2 && t.y2 === y2) ||
    (t.x1 === x2 && t.y1 === y2 && t.x2 === x1 && t.y2 === y1)
  )) return false;

  // Max 3 tracks per node (junction can have at most 3 connections)
  const n1 = nodeMap[nk(x1, y1)];
  const n2 = nodeMap[nk(x2, y2)];
  if (n1 && n1.trackIds.length >= 3) return false;
  if (n2 && n2.trackIds.length >= 3) return false;

  return true;
}

// ----------------------------------------------------------------
// MUTATION HELPERS
// ----------------------------------------------------------------
function addStation(gridX, gridY, platforms, name, orientation) {
  const id = genId();
  state.stations.push({
    id, name, gridX, gridY,
    platforms: platforms || 1,
    orientation: orientation || 'vertical',
  });
  saveState();
  return id;
}

function removeStation(id) {
  state.stations = state.stations.filter(s => s.id !== id);
  // Remove tracks connected to its endpoints
  const eps = [];
  // (already removed from state, so get endpoints before removal)
  // Actually: collect connected node keys first, then filter tracks
  recomputeNodeMap(); // needed after removal
  saveState();
}

function addTrack(x1, y1, x2, y2) {
  if (!canPlaceTrack(x1, y1, x2, y2)) return null;
  const id = genId();
  state.tracks.push({ id, x1, y1, x2, y2 });
  _addNodeEntry(x1, y1, id);
  _addNodeEntry(x2, y2, id);
  saveState();
  return id;
}

function removeTrack(id) {
  state.tracks = state.tracks.filter(t => t.id !== id);
  recomputeNodeMap();
  saveState();
}

function addTrain(name, color, originStationId, repeatInterval) {
  const id = genId();
  state.trains.push({
    id, name, color,
    originStationId,
    repeatInterval: repeatInterval || 60,
    stops: [],
  });
  saveState();
  return id;
}

function removeTrain(id) {
  state.trains = state.trains.filter(t => t.id !== id);
  saveState();
}

// ----------------------------------------------------------------
// TRAIN STOP DEFAULTS
// (Generate default stop list from route for a new/updated train)
// ----------------------------------------------------------------
function buildDefaultStops(train) {
  // Build route with all-straight junctions
  const route = buildRouteForTrain(train, {});
  if (!route.length) return [];

  const stops = [];
  let timeCursor = 0; // minutes

  for (let i = 0; i < route.length; i++) {
    const node = route[i];
    if (node.type === 'station') {
      const s = state.stations.find(st => st.id === node.stationId);
      const stopObj = {
        type: 'station',
        stationId: node.stationId,
        stopMode: (i === 0 || i === route.length - 1) ? 'stop' : 'stop',
        arrivalTime:   i === 0 ? timeCursor : timeCursor,
        departureTime: i === 0 ? timeCursor : timeCursor + 3,
        platform: node.platformIndex || 0,
      };
      stops.push(stopObj);
      timeCursor = stopObj.departureTime;
    } else if (node.type === 'junction') {
      stops.push({
        type: 'junction',
        nodeKey: node.nodeKey,
        arrivalTime: timeCursor,
        direction: 'straight',
      });
      // travel time to junction was already added between station and here
    }
    // Add travel time to next node
    if (i < route.length - 1) {
      const next = route[i + 1];
      // estimate distance via track
      const t = state.tracks.find(tr =>
        ((tr.x1 === node.x && tr.y1 === node.y && tr.x2 === next.x && tr.y2 === next.y) ||
         (tr.x2 === node.x && tr.y2 === node.y && tr.x1 === next.x && tr.y1 === next.y))
      );
      const travelMin = t ? trackTravelTime(t) : state.travelTimePerGrid;
      timeCursor += travelMin;
    }
  }

  return stops;
}

function buildRouteForTrain(train, junctionChoices) {
  if (!train.originStationId) return [];
  return findRoute(train.originStationId, 'auto', junctionChoices || {});
}

</script>
<script>
/* ================================================================
   PART 2: MAP CANVAS – PAN / ZOOM / RENDER ENGINE
================================================================ */

// ----------------------------------------------------------------
// Canvas setup (DPR-aware)
// ----------------------------------------------------------------
const canvas  = document.getElementById('map-canvas');
const ctx     = canvas.getContext('2d');
let   dpr     = window.devicePixelRatio || 1;

function resizeCanvas() {
  const container = document.getElementById('map-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  renderMap();
}

window.addEventListener('resize', resizeCanvas);

// ----------------------------------------------------------------
// VIEWPORT helpers
// ----------------------------------------------------------------
function applyZoom(delta, pivotX, pivotY) {
  const vp   = state.viewport;
  const oldZ = vp.zoom;
  let   newZ = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, oldZ + delta));
  const ratio = newZ / oldZ;
  vp.offsetX = pivotX - (pivotX - vp.offsetX) * ratio;
  vp.offsetY = pivotY - (pivotY - vp.offsetY) * ratio;
  vp.zoom    = newZ;
  document.getElementById('zoom-label').textContent =
    Math.round(newZ * 100) + '%';
}

function centerViewport() {
  // Center on all stations, or origin if empty
  const vp = state.viewport;
  vp.zoom  = 1;
  if (state.stations.length === 0) {
    const W = canvas.width  / dpr;
    const H = canvas.height / dpr;
    vp.offsetX = W / 2;
    vp.offsetY = H / 2;
  } else {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const s of state.stations) {
      const b = stationBounds(s);
      minX = Math.min(minX, b.x);
      minY = Math.min(minY, b.y);
      maxX = Math.max(maxX, b.x + b.w);
      maxY = Math.max(maxY, b.y + b.h);
    }
    const W = canvas.width  / dpr;
    const H = canvas.height / dpr;
    const cx = (minX + maxX) / 2 * GRID_PX;
    const cy = (minY + maxY) / 2 * GRID_PX;
    vp.offsetX = W / 2 - cx;
    vp.offsetY = H / 2 - cy;
  }
  document.getElementById('zoom-label').textContent =
    Math.round(vp.zoom * 100) + '%';
}

// ----------------------------------------------------------------
// MAIN RENDER
// ----------------------------------------------------------------
function renderMap() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.save();
  ctx.scale(dpr, dpr);
  const w = W / dpr, h = H / dpr;

  // Background
  ctx.fillStyle = '#f0f2f5';
  ctx.fillRect(0, 0, w, h);

  const vp   = state.viewport;
  const zoom = vp.zoom;
  const cellPx = GRID_PX * zoom;

  // ---- Draw grid (only in station/track tab) ----
  if (activeTab === 'station' || activeTab === 'track') {
    drawGrid(ctx, w, h, vp, cellPx);
  }

  // ---- Tracks ----
  drawTracks(ctx, w, h, vp, cellPx);

  // ---- Junction markers ----
  if (activeTab === 'station' || activeTab === 'track') {
    drawJunctions(ctx, vp, cellPx);
  }

  // ---- Stations ----
  drawStations(ctx, w, h, vp, cellPx);

  // ---- Track drawing preview / snap indicator ----
  if (activeTab === 'track' && trackMode === 'draw') {
    drawTrackPreview(ctx, vp, cellPx);
  }

  // ---- Train markers (simulation) ----
  if (activeTab === 'simulation' || state.sim.running) {
    drawTrains(ctx, w, h, vp, cellPx);
  }

  // ---- Timetable route highlight ----
  if (activeTab === 'timetable' && selectedTrainId) {
    drawRouteHighlight(ctx, vp, cellPx);
  }

  ctx.restore();
}

// ----------------------------------------------------------------
// GRID
// ----------------------------------------------------------------
function drawGrid(ctx, w, h, vp, cellPx) {
  // Compute visible grid range
  const x0 = Math.floor(-vp.offsetX / cellPx) - 1;
  const y0 = Math.floor(-vp.offsetY / cellPx) - 1;
  const x1 = Math.ceil((w - vp.offsetX) / cellPx) + 1;
  const y1 = Math.ceil((h - vp.offsetY) / cellPx) + 1;

  // Dot size scales with zoom
  const dotR = Math.max(1, Math.min(3, cellPx * 0.06));

  ctx.fillStyle = '#b0bec5';
  for (let gx = x0; gx <= x1; gx++) {
    for (let gy = y0; gy <= y1; gy++) {
      const px = gx * cellPx + vp.offsetX;
      const py = gy * cellPx + vp.offsetY;
      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ----------------------------------------------------------------
// TRACKS
// ----------------------------------------------------------------
function drawTracks(ctx, w, h, vp, cellPx) {
  const lineW = Math.max(1.5, cellPx * 0.06);

  for (const t of state.tracks) {
    if (!isTrackVisible(t, w, h)) continue;

    const p1 = gridToCanvas(t.x1, t.y1);
    const p2 = gridToCanvas(t.x2, t.y2);

    // Highlight selected track
    const isSelected = selectedTrackId === t.id && activeTab === 'track';

    ctx.save();
    ctx.strokeStyle = isSelected ? '#ef4444' : '#374151';
    ctx.lineWidth   = isSelected ? lineW * 2.2 : lineW * 1.4;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // Rail sleepers (ties) when zoomed in
    if (cellPx > 30 && !isSelected) {
      drawSleepers(ctx, p1.x, p1.y, p2.x, p2.y, lineW, cellPx);
    }
    ctx.restore();
  }
}

function drawSleepers(ctx, x1, y1, x2, y2, lineW, cellPx) {
  const dx   = x2 - x1, dy = y2 - y1;
  const len  = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;
  const nx   = -dy / len, ny = dx / len; // normal
  const step = cellPx * 0.25;
  const count = Math.floor(len / step);
  const slW  = lineW * 2.5;
  const slH  = lineW * 0.8;

  ctx.save();
  ctx.strokeStyle = '#78909c';
  ctx.lineWidth   = slH;
  ctx.lineCap     = 'butt';
  for (let i = 1; i < count; i++) {
    const t  = i / count;
    const cx = x1 + dx * t;
    const cy = y1 + dy * t;
    ctx.beginPath();
    ctx.moveTo(cx + nx * slW, cy + ny * slW);
    ctx.lineTo(cx - nx * slW, cy - ny * slW);
    ctx.stroke();
  }
  ctx.restore();
}

// ----------------------------------------------------------------
// JUNCTIONS
// ----------------------------------------------------------------
function drawJunctions(ctx, vp, cellPx) {
  const r = Math.max(3, cellPx * 0.13);
  for (const [key, node] of Object.entries(nodeMap)) {
    if (node.trackIds.length < 3) continue;
    const p = gridToCanvas(node.x, node.y);
    ctx.save();
    ctx.fillStyle   = '#f59e0b';
    ctx.strokeStyle = '#92400e';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

// ----------------------------------------------------------------
// STATIONS
// ----------------------------------------------------------------
function drawStations(ctx, w, h, vp, cellPx) {
  for (const s of state.stations) {
    const b  = stationBounds(s);
    const tl = gridToCanvas(b.x, b.y);
    const br = gridToCanvas(b.x + b.w, b.y + b.h);

    // Rough visibility check
    if (br.x < -cellPx || tl.x > w + cellPx ||
        br.y < -cellPx || tl.y > h + cellPx) continue;

    const isSelected = selectedStationId === s.id && activeTab === 'station';

    ctx.save();

    // Station body
    const bw = (br.x - tl.x);
    const bh = (br.y - tl.y);

    ctx.fillStyle   = '#fff';
    ctx.strokeStyle = isSelected ? '#ef4444' : '#2563eb';
    ctx.lineWidth   = isSelected ? 2.5 : 2;
    ctx.shadowColor = 'rgba(37,99,235,0.18)';
    ctx.shadowBlur  = 6;

    // Draw platforms (horizontal lines inside station body)
    if (s.orientation === 'vertical') {
      for (let i = 0; i < s.platforms; i++) {
        const py = gridToCanvas(b.x, b.y + i).y;
        const px1 = tl.x, px2 = br.x;
        // Platform rect
        const platH = Math.max(2, cellPx * 0.35);
        ctx.fillStyle = '#dbeafe';
        ctx.fillRect(px1, py - platH / 2, px2 - px1, platH);
        ctx.strokeStyle = isSelected ? '#ef4444' : '#2563eb';
        ctx.strokeRect(px1, py - platH / 2, px2 - px1, platH);
      }
    } else {
      for (let i = 0; i < s.platforms; i++) {
        const px = gridToCanvas(b.x + i, b.y).x;
        const py1 = tl.y, py2 = br.y;
        const platW = Math.max(2, cellPx * 0.35);
        ctx.fillStyle = '#dbeafe';
        ctx.fillRect(px - platW / 2, py1, platW, py2 - py1);
        ctx.strokeStyle = isSelected ? '#ef4444' : '#2563eb';
        ctx.strokeRect(px - platW / 2, py1, platW, py2 - py1);
      }
    }

    // Station name label
    ctx.shadowBlur  = 0;
    const fontSize  = Math.max(9, Math.min(14, cellPx * 0.26));
    ctx.font        = `bold ${fontSize}px sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    const midX      = (tl.x + br.x) / 2;
    const midY      = (tl.y + br.y) / 2;

    // White background for label
    const textW = ctx.measureText(s.name).width + 6;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(midX - textW / 2, midY - fontSize / 2 - 2, textW, fontSize + 4);

    ctx.fillStyle = isSelected ? '#dc2626' : '#1e40af';
    ctx.fillText(s.name, midX, midY);

    // Endpoint dots
    drawStationEndpoints(ctx, s, isSelected, cellPx);

    ctx.restore();
  }
}

function drawStationEndpoints(ctx, s, isSelected, cellPx) {
  const r = Math.max(3, cellPx * 0.11);
  const eps = stationEndpoints(s);
  for (const ep of eps) {
    const p = gridToCanvas(ep.x, ep.y);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle   = isSelected ? '#ef4444' : '#1d4ed8';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 1.5;
    ctx.fill();
    ctx.stroke();
  }
}

// ----------------------------------------------------------------
// TRACK DRAWING PREVIEW + SNAP INDICATOR
// ----------------------------------------------------------------
let hoverGrid = { x: 0, y: 0 }; // {x, y} grid coords under cursor

function drawTrackPreview(ctx, vp, cellPx) {
  if (!hoverGrid) return;
  const hSnapped = snapOrStation(hoverGrid.x, hoverGrid.y);

  // Always draw snap indicator at cursor position
  const snapPt = gridToCanvas(hSnapped.x, hSnapped.y);
  const snapR  = Math.max(5, cellPx * 0.15);

  if (!drawStart) {
    // No start selected yet: show hover indicator
    ctx.save();
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth   = 2;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(snapPt.x, snapPt.y, snapR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#2563eb';
    ctx.fill();
    ctx.restore();
    return;
  }

  // Draw start is set: show preview line
  const { x: hx, y: hy } = hSnapped;
  const dx = Math.abs(hx - drawStart.x), dy = Math.abs(hy - drawStart.y);
  const valid = (dx <= 1 && dy <= 1 && !(dx === 0 && dy === 0))
             && canPlaceTrack(drawStart.x, drawStart.y, hx, hy);
  const isSame = dx === 0 && dy === 0;

  const p1 = gridToCanvas(drawStart.x, drawStart.y);
  const p2 = gridToCanvas(hx, hy);

  ctx.save();

  // Preview line
  if (!isSame) {
    ctx.strokeStyle = valid ? '#2563eb' : '#ef4444';
    ctx.lineWidth   = Math.max(2.5, cellPx * 0.08);
    ctx.lineCap     = 'round';
    ctx.setLineDash([7, 4]);
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Start point (filled blue)
  ctx.globalAlpha = 1;
  ctx.fillStyle   = '#2563eb';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.arc(p1.x, p1.y, Math.max(5, cellPx * 0.14), 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // "S" label on start
  if (cellPx > 24) {
    ctx.font = `bold ${Math.max(8, cellPx * 0.18)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('S', p1.x, p1.y);
  }

  // Snap cursor indicator
  ctx.strokeStyle = valid ? '#2563eb' : (isSame ? '#f59e0b' : '#ef4444');
  ctx.lineWidth   = 2.5;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.arc(snapPt.x, snapPt.y, snapR, 0, Math.PI * 2);
  ctx.stroke();
  if (!isSame) {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle   = valid ? '#2563eb' : '#ef4444';
    ctx.fill();
  }

  ctx.restore();
}

// Snap to station endpoint if exactly matching grid coords
function snapOrStation(gx, gy) {
  for (const s of state.stations) {
    for (const ep of stationEndpoints(s)) {
      if (ep.x === gx && ep.y === gy) return { x: ep.x, y: ep.y };
    }
  }
  // Also snap to existing track nodes for easy connection
  const key = nk(gx, gy);
  if (nodeMap[key]) return { x: gx, y: gy };
  return { x: gx, y: gy };
}

// ----------------------------------------------------------------
// ROUTE HIGHLIGHT (timetable tab)
// ----------------------------------------------------------------
function drawRouteHighlight(ctx, vp, cellPx) {
  const train = state.trains.find(t => t.id === selectedTrainId);
  if (!train) return;

  // Build junction choices from stops
  const jChoices = {};
  for (const stop of train.stops) {
    if (stop.type === 'junction') jChoices[stop.nodeKey] = stop.direction || 'straight';
  }

  // Get route nodes
  const route = buildRouteForTrain(train, jChoices);
  if (route.length < 2) return;

  const lineW = Math.max(3, cellPx * 0.14);
  ctx.save();
  ctx.strokeStyle = train.color || '#2563eb';
  ctx.lineWidth   = lineW;
  ctx.lineCap     = 'round';
  ctx.globalAlpha = 0.55;

  for (let i = 0; i + 1 < route.length; i++) {
    const a = route[i], b = route[i + 1];
    const pa = gridToCanvas(a.x, a.y);
    const pb = gridToCanvas(b.x, b.y);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  }
  ctx.restore();
}

// ----------------------------------------------------------------
// TRAINS (simulation)
// ----------------------------------------------------------------
let trainPositions = []; // [{trainId, x, y (canvas grid), color, name, status}]

function drawTrains(ctx, w, h, vp, cellPx) {
  for (const tp of trainPositions) {
    const p = gridToCanvas(tp.gx, tp.gy);
    // Visibility check
    if (p.x < -20 || p.x > w + 20 || p.y < -20 || p.y > h + 20) continue;

    const r = Math.max(5, cellPx * 0.18);

    ctx.save();
    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur  = 4;
    ctx.fillStyle   = tp.color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Label
    if (cellPx > 28) {
      const fontSize = Math.max(7, Math.min(11, cellPx * 0.2));
      ctx.font        = `bold ${fontSize}px sans-serif`;
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle   = '#1f2937';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = 3;
      ctx.strokeText(tp.name, p.x, p.y - r - 1);
      ctx.fillText(tp.name, p.x, p.y - r - 1);
    }
    ctx.restore();
  }
}

// ----------------------------------------------------------------
// CANVAS MOUSE / TOUCH EVENTS
// ----------------------------------------------------------------
let pointerDownOnCanvas = false;

canvas.addEventListener('pointerdown', onCanvasPointerDown);
canvas.addEventListener('pointermove', onCanvasPointerMove);
canvas.addEventListener('pointerup',   onCanvasPointerUp);
canvas.addEventListener('pointerleave',onCanvasPointerLeave);
canvas.addEventListener('wheel',       onCanvasWheel, { passive: false });

function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onCanvasPointerDown(e) {
  if (e.pointerType === 'touch') return; // handled by touch events
  e.preventDefault();
  pointerDownOnCanvas = true;

  const { x, y } = canvasXY(e);
  const g = snapToGrid(x, y);

  // ---- Station placement mode ----
  if (placingStation) {
    onMapClickForStation(g.x, g.y);
    return;
  }

  // ---- Station drag (station tab) ----
  if (activeTab === 'station' && e.button === 0) {
    const hit = hitTestStation(x, y);
    if (hit) {
      // Check if click is on the station body (not endpoint)
      selectStation(hit.id);
      draggingStation = {
        id: hit.id,
        startGX: hit.gridX, startGY: hit.gridY,
        mouseStartX: x, mouseStartY: y,
      };
      canvas.classList.add('grabbing');
      return;
    }
    selectStation(null);
  }

  // ---- Track tab ----
  if (activeTab === 'track') {
    if (trackMode === 'draw' && e.button === 0) {
      const gs = snapOrStation(g.x, g.y); // snap to station endpoint if nearby
      if (!drawStart) {
        drawStart = { x: gs.x, y: gs.y };
      } else {
        // Attempt to place track
        const x2 = gs.x, y2 = gs.y;
        const dx = Math.abs(x2 - drawStart.x), dy = Math.abs(y2 - drawStart.y);
        if (dx === 0 && dy === 0) {
          // Same point: cancel
          drawStart = null;
          showTrackError('');
        } else if (dx > 1 || dy > 1) {
          showTrackError('隣接する点（1マス以内）を選択してください。斜めは45度のみ対応です。');
        } else if (!canPlaceTrack(drawStart.x, drawStart.y, x2, y2)) {
          const n1 = nodeMap[nk(drawStart.x, drawStart.y)];
          const n2 = nodeMap[nk(x2, y2)];
          if (n1 && n1.trackIds.length >= 3) showTrackError('始点はすでに3本の線路が接続されています（上限）。');
          else if (n2 && n2.trackIds.length >= 3) showTrackError('終点はすでに3本の線路が接続されています（上限）。');
          else showTrackError('その区間にはすでに線路があります。');
        } else {
          addTrack(drawStart.x, drawStart.y, x2, y2);
          showTrackError('');
          // 連続描画: 終点を次の始点にセット
          drawStart = { x: x2, y: y2 };
          renderTrackTab();
        }
        renderMap();
      }
      return;
    }
    if (trackMode === 'select' && e.button === 0) {
      const hit = hitTestTrack(x, y);
      if (hit) {
        selectTrack(hit.id);
      } else {
        selectTrack(null);
      }
    }
  }

  // ---- Map pan (right button or middle, or no special mode) ----
  if (e.button === 1 || e.button === 2 ||
      (activeTab === 'simulation' || activeTab === 'timetable') && e.button === 0) {
    isDragging  = true;
    dragStart   = { x, y };
    dragOrigin  = { x: state.viewport.offsetX, y: state.viewport.offsetY };
    canvas.classList.add('grabbing');
  }
}

function onCanvasPointerMove(e) {
  if (e.pointerType === 'touch') return;
  const { x, y } = canvasXY(e);
  const g  = snapToGrid(x, y);
  hoverGrid = g;

  // Update cursor info
  const ci = document.getElementById('map-cursor-info');
  if (ci) ci.textContent = `グリッド (${g.x}, ${g.y})`;

  if (draggingStation) {
    moveDraggingStation(x, y);
    return;
  }

  if (isDragging) {
    state.viewport.offsetX = dragOrigin.x + (x - dragStart.x);
    state.viewport.offsetY = dragOrigin.y + (y - dragStart.y);
  }

  renderMap();
}

function onCanvasPointerUp(e) {
  if (e.pointerType === 'touch') return;
  if (draggingStation) {
    draggingStation = null;
    saveState();
  }
  if (isDragging) isDragging = false;
  canvas.classList.remove('grabbing');
  pointerDownOnCanvas = false;
}

function onCanvasPointerLeave() {
  hoverGrid = null;
  if (!isDragging && !draggingStation) {
    canvas.classList.remove('grabbing');
  }
  renderMap();
}

function onCanvasWheel(e) {
  e.preventDefault();
  const { x, y } = canvasXY(e);
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  applyZoom(delta, x, y);
  document.getElementById('zoom-label').textContent =
    Math.round(state.viewport.zoom * 100) + '%';
  renderMap();
}

// ----------------------------------------------------------------
// TOUCH EVENTS (pinch zoom + pan)
// ----------------------------------------------------------------
let touches = {};

canvas.addEventListener('touchstart', onTouchStart, { passive: false });
canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });

function getTouchXY(touch) {
  const rect = canvas.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const { x, y } = getTouchXY(e.touches[0]);
    const g = snapToGrid(x, y);

    if (placingStation) {
      onMapClickForStation(g.x, g.y);
      return;
    }
    if (activeTab === 'station') {
      const hit = hitTestStation(x, y);
      if (hit) {
        selectStation(hit.id);
        draggingStation = {
          id: hit.id,
          startGX: hit.gridX, startGY: hit.gridY,
          mouseStartX: x, mouseStartY: y,
        };
        return;
      }
    }
    if (activeTab === 'track' && trackMode === 'draw') {
      const gs2 = snapOrStation(g.x, g.y);
      if (!drawStart) {
        drawStart = gs2;
      } else {
        const dx = Math.abs(gs2.x - drawStart.x), dy = Math.abs(gs2.y - drawStart.y);
        if (dx === 0 && dy === 0) {
          drawStart = null;
        } else if (dx <= 1 && dy <= 1 && canPlaceTrack(drawStart.x, drawStart.y, gs2.x, gs2.y)) {
          addTrack(drawStart.x, drawStart.y, gs2.x, gs2.y);
          drawStart = { x: gs2.x, y: gs2.y }; // 連続描画
          renderTrackTab();
        } else {
          showTrackError('隣接する点をタップしてください。');
        }
        renderMap();
      }
      return;
    }
    // Pan
    isDragging = true;
    dragStart  = { x, y };
    dragOrigin = { x: state.viewport.offsetX, y: state.viewport.offsetY };

  } else if (e.touches.length === 2) {
    isDragging     = false;
    draggingStation = null;
    const t1 = getTouchXY(e.touches[0]);
    const t2 = getTouchXY(e.touches[1]);
    lastTouchDist = Math.hypot(t2.x - t1.x, t2.y - t1.y);
    lastTouchMid  = { x: (t1.x + t2.x) / 2, y: (t1.y + t2.y) / 2 };
    dragOrigin    = { x: state.viewport.offsetX, y: state.viewport.offsetY };
    dragStart     = lastTouchMid;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const { x, y } = getTouchXY(e.touches[0]);
    hoverGrid = snapToGrid(x, y);
    if (draggingStation) {
      moveDraggingStation(x, y);
      return;
    }
    if (isDragging) {
      state.viewport.offsetX = dragOrigin.x + (x - dragStart.x);
      state.viewport.offsetY = dragOrigin.y + (y - dragStart.y);
    }
    renderMap();

  } else if (e.touches.length === 2) {
    const t1 = getTouchXY(e.touches[0]);
    const t2 = getTouchXY(e.touches[1]);
    const dist = Math.hypot(t2.x - t1.x, t2.y - t1.y);
    const mid  = { x: (t1.x + t2.x) / 2, y: (t1.y + t2.y) / 2 };

    if (lastTouchDist && lastTouchMid) {
      // Pinch zoom
      const scaleDelta = (dist / lastTouchDist - 1) * 0.7;
      applyZoom(scaleDelta, mid.x, mid.y);

      // Pan
      state.viewport.offsetX += mid.x - lastTouchMid.x;
      state.viewport.offsetY += mid.y - lastTouchMid.y;
    }
    lastTouchDist = dist;
    lastTouchMid  = mid;
    document.getElementById('zoom-label').textContent =
      Math.round(state.viewport.zoom * 100) + '%';
    renderMap();
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    isDragging      = false;
    lastTouchDist   = null;
    lastTouchMid    = null;
    if (draggingStation) { draggingStation = null; saveState(); }
  }
}

// ----------------------------------------------------------------
// HIT TESTING
// ----------------------------------------------------------------
function hitTestStation(cx, cy) {
  const threshold = Math.max(GRID_PX * state.viewport.zoom * 1.2, 20);
  for (const s of state.stations) {
    const b  = stationBounds(s);
    const tl = gridToCanvas(b.x, b.y);
    const br = gridToCanvas(b.x + b.w, b.y + b.h);
    if (cx >= tl.x - 6 && cx <= br.x + 6 &&
        cy >= tl.y - 6 && cy <= br.y + 6) {
      return s;
    }
  }
  return null;
}

function hitTestTrack(cx, cy) {
  const threshold = Math.max(6, GRID_PX * state.viewport.zoom * 0.12);
  for (const t of state.tracks) {
    const p1 = gridToCanvas(t.x1, t.y1);
    const p2 = gridToCanvas(t.x2, t.y2);
    const dist = pointToSegmentDist(cx, cy, p1.x, p1.y, p2.x, p2.y);
    if (dist < threshold) return t;
  }
  return null;
}

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// ----------------------------------------------------------------
// STATION DRAG
// ----------------------------------------------------------------
function moveDraggingStation(mx, my) {
  if (!draggingStation) return;
  const s = state.stations.find(s => s.id === draggingStation.id);
  if (!s) return;
  const gCur   = snapToGrid(mx, my);
  const gStart = snapToGrid(draggingStation.mouseStartX, draggingStation.mouseStartY);
  s.gridX = draggingStation.startGX + (gCur.x - gStart.x);
  s.gridY = draggingStation.startGY + (gCur.y - gStart.y);
  renderMap();
}

// ----------------------------------------------------------------
// ZOOM TOOLBAR BUTTONS
// ----------------------------------------------------------------
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const W = canvas.width / dpr, H = canvas.height / dpr;
  applyZoom(ZOOM_STEP, W / 2, H / 2);
  renderMap();
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const W = canvas.width / dpr, H = canvas.height / dpr;
  applyZoom(-ZOOM_STEP, W / 2, H / 2);
  renderMap();
});
document.getElementById('btn-zoom-reset').addEventListener('click', () => {
  centerViewport();
  renderMap();
});

// I/O buttons
document.getElementById('btn-export').addEventListener('click', exportData);
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-file-input').click();
});
document.getElementById('import-file-input').addEventListener('change', e => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});

// ----------------------------------------------------------------
// renderAll: convenience wrapper
// ----------------------------------------------------------------
function renderAll() {
  renderMap();
}

</script>

<script>
/* ================================================================
   PART 3: STATION PLACEMENT TAB
================================================================ */

// ----------------------------------------------------------------
// Station counter for default naming
// ----------------------------------------------------------------
let stationCounter = 1;
function nextStationName() {
  return `駅${stationCounter++}`;
}

// ----------------------------------------------------------------
// Selection helpers
// ----------------------------------------------------------------
function selectStation(id) {
  selectedStationId = id;
  document.getElementById('btn-delete-station').disabled = !id;
  document.getElementById('btn-station-orient').disabled = !id;
  renderStationTab();
  renderMap();
}

function selectTrack(id) {
  selectedTrackId = id;
  document.getElementById('btn-delete-track').disabled = !id;
  renderMap();
}

// ----------------------------------------------------------------
// Place-station mode
// ----------------------------------------------------------------
document.getElementById('btn-mode-place-station').addEventListener('click', () => {
  placingStation = !placingStation;
  const btn = document.getElementById('btn-mode-place-station');
  if (placingStation) {
    btn.classList.add('active');
    btn.innerHTML = '<i class="fa-solid fa-xmark"></i> キャンセル';
    canvas.classList.add('mode-place');
    document.getElementById('station-mode-hint').textContent = 'マップをクリックして駅を配置';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<i class="fa-solid fa-plus"></i> 駅を追加';
    canvas.classList.remove('mode-place');
    document.getElementById('station-mode-hint').textContent = '「駅を追加」→マップをクリックして配置';
  }
});

// ----------------------------------------------------------------
// Map click → place station
// ----------------------------------------------------------------
function onMapClickForStation(gx, gy) {
  // Check for overlap with existing stations
  if (wouldOverlapStation(gx, gy, 1, 'vertical')) {
    alert('その位置には既に駅があります。別の場所を選んでください。');
    return;
  }

  pendingStation = { gridX: gx, gridY: gy };
  openStationModal(null); // null = new station
}

function wouldOverlapStation(gx, gy, platforms, orientation) {
  const testBounds = orientation === 'horizontal'
    ? { x: gx, y: gy, w: platforms, h: 2 }
    : { x: gx, y: gy, w: 2, h: platforms };

  for (const s of state.stations) {
    const b = stationBounds(s);
    // AABB overlap
    if (testBounds.x <= b.x + b.w && testBounds.x + testBounds.w >= b.x &&
        testBounds.y <= b.y + b.h && testBounds.y + testBounds.h >= b.y) {
      return true;
    }
  }
  return false;
}

// ----------------------------------------------------------------
// Station modal
// ----------------------------------------------------------------
const modalStation = document.getElementById('modal-station');

function openStationModal(stationId) {
  const nameInput  = document.getElementById('modal-station-name');
  const platInput  = document.getElementById('modal-station-platforms');

  if (stationId) {
    const s = state.stations.find(s => s.id === stationId);
    if (!s) return;
    nameInput.value = s.name;
    platInput.value = s.platforms;
    modalStation._editId = stationId;
  } else {
    nameInput.value = nextStationName();
    platInput.value = 1;
    modalStation._editId = null;
  }
  modalStation.classList.remove('hidden');
  nameInput.focus();
  nameInput.select();
}

document.getElementById('modal-station-ok').addEventListener('click', () => {
  const name     = document.getElementById('modal-station-name').value.trim() || nextStationName();
  const platforms = Math.max(1, Math.min(10, parseInt(document.getElementById('modal-station-platforms').value) || 1));

  if (modalStation._editId) {
    // Edit existing
    const s = state.stations.find(s => s.id === modalStation._editId);
    if (s) { s.name = name; s.platforms = platforms; }
    saveState();
  } else {
    // New station
    const { gridX, gridY } = pendingStation;
    addStation(gridX, gridY, platforms, name, 'vertical');
    // Exit placing mode after each placement
    exitPlacingMode();
  }
  modalStation.classList.add('hidden');
  pendingStation = null;
  recomputeNodeMap(); // endpoints may change
  renderStationTab();
  renderMap();
});

document.getElementById('modal-station-cancel').addEventListener('click', () => {
  modalStation.classList.add('hidden');
  pendingStation = null;
  exitPlacingMode();
});

function exitPlacingMode() {
  placingStation = false;
  const btn = document.getElementById('btn-mode-place-station');
  btn.classList.remove('active');
  btn.innerHTML = '<i class="fa-solid fa-plus"></i> 駅を追加';
  canvas.classList.remove('mode-place');
  document.getElementById('station-mode-hint').textContent = '「駅を追加」→マップをクリックして配置';
}

// Close modal on overlay click
modalStation.addEventListener('click', e => {
  if (e.target === modalStation) {
    modalStation.classList.add('hidden');
    pendingStation = null;
    exitPlacingMode();
  }
});

// ----------------------------------------------------------------
// Orientation toggle
// ----------------------------------------------------------------
document.getElementById('btn-station-orient').addEventListener('click', () => {
  if (!selectedStationId) return;
  const s = state.stations.find(s => s.id === selectedStationId);
  if (!s) return;
  s.orientation = s.orientation === 'vertical' ? 'horizontal' : 'vertical';
  recomputeNodeMap();
  saveState();
  renderStationTab();
  renderMap();
});

// ----------------------------------------------------------------
// Delete station
// ----------------------------------------------------------------
document.getElementById('btn-delete-station').addEventListener('click', () => {
  if (!selectedStationId) return;
  if (!confirm('この駅を削除しますか？')) return;
  // Remove station (tracks remain as per spec: P2)
  state.stations = state.stations.filter(s => s.id !== selectedStationId);
  recomputeNodeMap();
  saveState();
  selectStation(null);
  renderStationTab();
  renderMap();
});

// ----------------------------------------------------------------
// Render station tab list
// ----------------------------------------------------------------
function renderStationTab() {
  const list = document.getElementById('station-list');
  const emptyMsg = document.getElementById('station-empty-msg');

  if (state.stations.length === 0) {
    emptyMsg.style.display = '';
    list.innerHTML = '';
    list.appendChild(emptyMsg);
    return;
  }

  emptyMsg.style.display = 'none';
  // Rebuild list
  const fragment = document.createDocumentFragment();

  for (const s of state.stations) {
    const item = document.createElement('div');
    item.className = 'station-item' + (s.id === selectedStationId ? ' selected' : '');
    item.dataset.id = s.id;

    // Icon
    const icon = document.createElement('div');
    icon.className = 'station-icon';
    icon.innerHTML = '<i class="fa-solid fa-location-dot"></i>';
    item.appendChild(icon);

    // Name input
    const nameInput = document.createElement('input');
    nameInput.type        = 'text';
    nameInput.className   = 'station-name-input';
    nameInput.value       = s.name;
    nameInput.placeholder = '駅名';
    nameInput.addEventListener('change', () => {
      s.name = nameInput.value.trim() || s.name;
      saveState();
      renderMap();
    });
    nameInput.addEventListener('click', e => e.stopPropagation());
    item.appendChild(nameInput);

    // Meta: platforms + orientation
    const meta = document.createElement('div');
    meta.className = 'station-meta';

    // Platform count
    const platSelect = document.createElement('select');
    platSelect.style.cssText = 'width:58px;font-size:11px;padding:2px 4px';
    for (let p = 1; p <= 10; p++) {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = `${p}番線`;
      if (p === s.platforms) opt.selected = true;
      platSelect.appendChild(opt);
    }
    platSelect.addEventListener('change', e => {
      s.platforms = parseInt(e.target.value);
