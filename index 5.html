      recomputeNodeMap();
      saveState();
      renderMap();
      e.stopPropagation();
    });
    platSelect.addEventListener('click', e => e.stopPropagation());

    // Orient badge
    const orientBadge = document.createElement('span');
    orientBadge.className = 'badge ' + (s.orientation === 'horizontal' ? 'badge-amber' : 'badge-blue');
    orientBadge.textContent = s.orientation === 'horizontal' ? '横' : '縦';

    // Edit button
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-sm btn-icon';
    editBtn.title = '詳細設定';
    editBtn.innerHTML = '<i class="fa-solid fa-pen"></i>';
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      selectStation(s.id);
      openStationModal(s.id);
    });

    meta.appendChild(platSelect);
    meta.appendChild(orientBadge);
    meta.appendChild(editBtn);
    item.appendChild(meta);

    // Click to select
    item.addEventListener('click', () => {
      selectStation(s.id);
      scrollToStation(s.id);
    });

    fragment.appendChild(item);
  }

  list.innerHTML = '';
  list.appendChild(fragment);
  list.appendChild(emptyMsg);
}

function scrollToStation(id) {
  const s = state.stations.find(s => s.id === id);
  if (!s) return;
  const b  = stationBounds(s);
  const cx = (b.x + b.w / 2) * GRID_PX * state.viewport.zoom + state.viewport.offsetX;
  const cy = (b.y + b.h / 2) * GRID_PX * state.viewport.zoom + state.viewport.offsetY;
  const W  = canvas.width / dpr, H = canvas.height / dpr;
  state.viewport.offsetX += W / 2 - cx;
  state.viewport.offsetY += H / 2 - cy;
  renderMap();
}

</script>

<script>
/* ================================================================
   PART 4: TRACK / WIRING TAB
================================================================ */

// ----------------------------------------------------------------
// Track mode buttons
// ----------------------------------------------------------------
document.getElementById('btn-track-draw').addEventListener('click', () => {
  setTrackMode('draw');
});
document.getElementById('btn-track-select').addEventListener('click', () => {
  setTrackMode('select');
  drawStart = null;
});

let _trackErrorTimer = null;
function showTrackError(msg) {
  const el = document.getElementById('track-error-msg');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
  if (_trackErrorTimer) clearTimeout(_trackErrorTimer);
  if (msg) _trackErrorTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function setTrackMode(mode) {
  trackMode = mode;
  drawStart = null;
  canvas.classList.remove('mode-draw', 'mode-select');
  canvas.classList.add('mode-' + mode);

  document.getElementById('btn-track-draw').classList.toggle('active', mode === 'draw');
  document.getElementById('btn-track-select').classList.toggle('active', mode === 'select');
  renderMap();
}

// ----------------------------------------------------------------
// Travel time input
// ----------------------------------------------------------------
document.getElementById('travel-time-input').addEventListener('change', e => {
  const v = parseFloat(e.target.value);
  if (v > 0) state.travelTimePerGrid = v;
  else e.target.value = state.travelTimePerGrid;
  saveState();
  renderTrackTab();
});

// ----------------------------------------------------------------
// Delete track
// ----------------------------------------------------------------
document.getElementById('btn-delete-track').addEventListener('click', () => {
  if (!selectedTrackId) return;
  removeTrack(selectedTrackId);
  selectTrack(null);
  renderTrackTab();
  renderMap();
});

// ----------------------------------------------------------------
// Render track tab info
// ----------------------------------------------------------------
function renderTrackTab() {
  const info = document.getElementById('track-info');
  const deleteBtn = document.getElementById('btn-delete-track');
  deleteBtn.disabled = !selectedTrackId;

  // Update travel time input
  document.getElementById('travel-time-input').value = state.travelTimePerGrid;

  // Show track count and junction info
  const junctions = Object.values(nodeMap).filter(n => n.trackIds.length >= 3);
  let html = `<span class="badge badge-blue">${state.tracks.length} 本の線路</span> `;
  html += `<span class="badge badge-amber">${junctions.length} 分岐</span>`;

  if (selectedTrackId) {
    const t = state.tracks.find(t => t.id === selectedTrackId);
    if (t) {
      const dist = gridDist(t.x1, t.y1, t.x2, t.y2);
      const mins = (dist * state.travelTimePerGrid).toFixed(1);
      html += `<br><span class="text-sm" style="margin-top:4px;display:block">
        選択中: (${t.x1},${t.y1}) → (${t.x2},${t.y2}) &nbsp;|&nbsp; 
        所要時間: <strong>${mins}分</strong>
        ${dist === SQRT2 ? '（斜め）' : ''}
      </span>`;
    }
  }

  if (drawStart) {
    html += `<br><span class="text-sm" style="margin-top:6px;display:flex;align-items:center;gap:8px;
      background:#eff6ff;border:1px solid #93c5fd;border-radius:6px;padding:5px 9px">
      <i class="fa-solid fa-pen" style="color:#2563eb;font-size:11px"></i>
      <span>始点 <strong>(${drawStart.x}, ${drawStart.y})</strong> — 隣の点をクリックして線路を引く。右クリック/ESCでキャンセル</span>
      <button class="btn btn-sm" onclick="drawStart=null;showTrackError('');renderMap();renderTrackTab()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </span>`;
  }

  info.innerHTML = html;
}

// ----------------------------------------------------------------
// Keyboard shortcuts
// ----------------------------------------------------------------
document.addEventListener('keydown', e => {
  // Escape: cancel drawing / deselect
  if (e.key === 'Escape') {
    drawStart = null;
    showTrackError('');
    exitPlacingMode();
    selectStation(null);
    selectTrack(null);
    renderMap();
    renderTrackTab();
  }
  // Delete: remove selected item
  if ((e.key === 'Delete' || e.key === 'Backspace') &&
      document.activeElement.tagName !== 'INPUT' &&
      document.activeElement.tagName !== 'SELECT') {
    if (selectedTrackId && activeTab === 'track') {
      removeTrack(selectedTrackId);
      selectTrack(null);
      renderTrackTab();
      renderMap();
    }
    if (selectedStationId && activeTab === 'station') {
      state.stations = state.stations.filter(s => s.id !== selectedStationId);
      recomputeNodeMap();
      saveState();
      selectStation(null);
      renderStationTab();
      renderMap();
    }
  }
});

// ----------------------------------------------------------------
// Context menu: prevent default on canvas (we use right-click for pan)
// ----------------------------------------------------------------
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (activeTab === 'track' && trackMode === 'draw' && drawStart) {
    // Right-click cancels current draw
    drawStart = null;
    showTrackError('');
    renderMap();
    renderTrackTab();
  }
});

</script>

<script>
/* ================================================================
   PART 5: TIMETABLE (DIAGRAM SETTING) TAB
================================================================ */

// ----------------------------------------------------------------
// Train modal helpers
// ----------------------------------------------------------------
const modalTrain = document.getElementById('modal-train');

function openTrainModal(trainId) {
  const nameInput   = document.getElementById('modal-train-name');
  const colorInput  = document.getElementById('modal-train-color');
  const originSel   = document.getElementById('modal-train-origin');
  const repeatH     = document.getElementById('modal-train-repeat-h');
  const repeatM     = document.getElementById('modal-train-repeat-m');

  // Populate repeat hour/min dropdowns
  populateTimeSelect(repeatH, 23);
  populateTimeSelect(repeatM, 59, 1);

  // Populate origin station dropdown
  originSel.innerHTML = '<option value="">-- 始発駅を選択 --</option>';
  for (const s of state.stations) {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    originSel.appendChild(opt);
  }

  if (trainId) {
    const tr = state.trains.find(t => t.id === trainId);
    if (!tr) return;
    nameInput.value        = tr.name;
    colorInput.value       = tr.color;
    originSel.value        = tr.originStationId || '';
    repeatH.value          = Math.floor((tr.repeatInterval || 60) / 60);
    repeatM.value          = (tr.repeatInterval || 60) % 60;
    modalTrain._editId     = trainId;
  } else {
    nameInput.value        = `列車${state.trains.length + 1}`;
    colorInput.value       = TRAIN_COLORS[state.trains.length % TRAIN_COLORS.length];
    originSel.value        = state.stations[0]?.id || '';
    repeatH.value          = 1;
    repeatM.value          = 0;
    modalTrain._editId     = null;
  }

  modalTrain.classList.remove('hidden');
  nameInput.focus();
}

document.getElementById('modal-train-ok').addEventListener('click', () => {
  const name     = document.getElementById('modal-train-name').value.trim();
  const color    = document.getElementById('modal-train-color').value;
  const originId = document.getElementById('modal-train-origin').value;
  const rh       = parseInt(document.getElementById('modal-train-repeat-h').value) || 0;
  const rm       = parseInt(document.getElementById('modal-train-repeat-m').value) || 0;
  const interval = rh * 60 + rm;

  if (!originId) { alert('始発駅を選択してください。'); return; }
  if (!name)     { alert('列車名を入力してください。'); return; }

  if (modalTrain._editId) {
    const tr = state.trains.find(t => t.id === modalTrain._editId);
    if (tr) {
      tr.name           = name;
      tr.color          = color;
      tr.originStationId = originId;
      tr.repeatInterval = Math.max(1, interval);
    }
  } else {
    const id = addTrain(name, color, originId, Math.max(1, interval));
    // Build default stops for the new train
    const newTrain = state.trains.find(t => t.id === id);
    if (newTrain) {
      newTrain.stops = buildDefaultStops(newTrain);
    }
    selectedTrainId = id;
  }

  saveState();
  modalTrain.classList.add('hidden');
  renderTrainList();
  renderScheduleEditor();
  renderMap();
});

document.getElementById('modal-train-cancel').addEventListener('click', () => {
  modalTrain.classList.add('hidden');
});
modalTrain.addEventListener('click', e => {
  if (e.target === modalTrain) modalTrain.classList.add('hidden');
});

// ----------------------------------------------------------------
// Add / Delete train buttons
// ----------------------------------------------------------------
document.getElementById('btn-add-train').addEventListener('click', () => {
  if (state.stations.length === 0) {
    alert('先に駅を配置してください。');
    return;
  }
  openTrainModal(null);
});

document.getElementById('btn-delete-train').addEventListener('click', () => {
  if (!selectedTrainId) return;
  if (!confirm('この列車を削除しますか？')) return;
  removeTrain(selectedTrainId);
  selectedTrainId = null;
  document.getElementById('btn-delete-train').disabled = true;
  renderTrainList();
  renderScheduleEditor();
  renderMap();
});

// ----------------------------------------------------------------
// Train list
// ----------------------------------------------------------------
function renderTrainList() {
  const list     = document.getElementById('train-list');
  const emptyMsg = document.getElementById('train-empty-msg');
  const delBtn   = document.getElementById('btn-delete-train');

  list.innerHTML = '';
  delBtn.disabled = !selectedTrainId;

  if (state.trains.length === 0) {
    list.appendChild(emptyMsg);
    emptyMsg.style.display = '';
    return;
  }
  emptyMsg.style.display = 'none';

  for (const tr of state.trains) {
    const item = document.createElement('div');
    item.className = 'train-item' + (tr.id === selectedTrainId ? ' selected' : '');

    const swatch = document.createElement('div');
    swatch.className = 'train-color-swatch';
    swatch.style.background = tr.color;

    const nameSpan = document.createElement('span');
    nameSpan.className   = 'train-name';
    nameSpan.textContent = tr.name;

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-sm btn-icon';
    editBtn.title     = '設定';
    editBtn.innerHTML = '<i class="fa-solid fa-pen"></i>';
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      openTrainModal(tr.id);
    });

    item.appendChild(swatch);
    item.appendChild(nameSpan);
    item.appendChild(editBtn);

    item.addEventListener('click', () => {
      selectedTrainId = tr.id;
      delBtn.disabled = false;
      renderTrainList();
      renderScheduleEditor();
      renderMap();
    });

    list.appendChild(item);
  }
}

// ----------------------------------------------------------------
// Schedule editor (right pane)
// ----------------------------------------------------------------
function renderScheduleEditor() {
  const editor  = document.getElementById('schedule-editor');
  const emptyMsg = document.getElementById('tt-empty-msg');

  if (!selectedTrainId) {
    editor.innerHTML   = '';
    emptyMsg.style.display = '';
    return;
  }
  emptyMsg.style.display = 'none';

  const train = state.trains.find(t => t.id === selectedTrainId);
  if (!train) { editor.innerHTML = ''; return; }

  // Rebuild route from junction choices in stops
  const jChoices = getJunctionChoicesFromStops(train.stops);
  const route    = buildFullRoute(train, jChoices);

  // Sync stops to route
  syncStopsToRoute(train, route);

  // Render
  editor.innerHTML = '';

  // Header (train color + interval info)
  const header = document.createElement('div');
  header.className = 'sched-header';
  header.innerHTML = `
    <span style="display:inline-block;width:13px;height:13px;
      border-radius:50%;background:${train.color};flex-shrink:0"></span>
    <strong>${train.name}</strong>
    <span class="badge badge-gray">
      <i class="fa-solid fa-rotate"></i>
      ${fmtTime(train.repeatInterval)}間隔で繰り返し
    </span>
  `;
  editor.appendChild(header);

  if (route.length === 0) {
    editor.innerHTML += `<p class="text-muted mt-2">
      始発駅から先の路線が見つかりません。配線タブで線路を引いてください。
    </p>`;
    return;
  }

  // Stop list
  const list = document.createElement('div');
  list.className = 'sched-list';

  for (let i = 0; i < route.length; i++) {
    const node  = route[i];
    const isLast = i === route.length - 1;

    const row = document.createElement('div');
    row.className = 'sched-row';

    // Left column: dot + vertical line
    const lineCol = document.createElement('div');
    lineCol.className = 'sched-line-col';

    const dot = document.createElement('div');
    dot.className = 'sched-dot ' +
      (node.type === 'station'  ? (i === 0 || isLast ? 'endpoint' : 'station') :
       node.type === 'junction' ? 'junction' : 'endpoint');

    dot.innerHTML = node.type === 'station'
      ? '<i class="fa-solid fa-circle-dot" style="font-size:8px"></i>'
      : '<i class="fa-solid fa-code-branch" style="font-size:8px"></i>';

    lineCol.appendChild(dot);
    if (!isLast) {
      const vline = document.createElement('div');
      vline.className = 'sched-vline';
      lineCol.appendChild(vline);
    }
    row.appendChild(lineCol);

    // Right column: content
    const content = document.createElement('div');
    content.className = 'sched-content';

    if (node.type === 'station') {
      renderStationStop(content, train, node, i, isLast, route);
    } else if (node.type === 'junction') {
      renderJunctionStop(content, train, node, i, route);
    }

    row.appendChild(content);
    list.appendChild(row);

    // Travel time to next node
    if (!isLast) {
      const travelRow = buildTravelTimeRow(route[i], route[i + 1]);
      list.appendChild(travelRow);
    }
  }

  editor.appendChild(list);
}

// ----------------------------------------------------------------
// Station stop render
// ----------------------------------------------------------------
function renderStationStop(container, train, node, idx, isLast, route) {
  const stop = findOrCreateStop(train, node);
  const s    = state.stations.find(st => st.id === node.stationId);
  if (!s) return;

  // Platform info
  const platformLabel = node.platformIndex != null
    ? `${node.platformIndex + 1}番線` : '—';

  // Direction badge
  let dirBadge = '';
  if (idx === 0) {
    dirBadge = '<span class="badge badge-green"><i class="fa-solid fa-arrow-right"></i> 出発</span>';
  } else if (isLast) {
    dirBadge = '<span class="badge badge-green"><i class="fa-solid fa-rotate-left"></i> 折り返し</span>';
  }

  // Title
  const title = document.createElement('div');
  title.className = 'sched-title';
  title.innerHTML = `
    <i class="fa-solid fa-location-dot" style="color:#2563eb;font-size:12px"></i>
    ${s.name}
    ${dirBadge}
    <span class="badge ${stop.stopMode === 'stop' ? 'badge-blue' : 'badge-gray'}">
      ${stop.stopMode === 'stop' ? '停車' : '通過'}
    </span>
    <small style="color:#9ca3af;font-weight:400">${platformLabel}</small>
  `;
  container.appendChild(title);

  // Fields
  const fields = document.createElement('div');
  fields.className = 'sched-fields';

  // Stop/Pass toggle
  if (idx > 0 && !isLast) {
    const stopPassField = document.createElement('div');
    stopPassField.className = 'sched-field';
    stopPassField.innerHTML = '<label>種別:</label>';
    const sel = document.createElement('select');
    sel.style.cssText = 'width:62px;font-size:11px;padding:2px 4px';
    ['stop','pass'].forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v === 'stop' ? '停車' : '通過';
      if (stop.stopMode === v) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => {
      stop.stopMode = sel.value;
      if (stop.stopMode === 'pass') stop.departureTime = stop.arrivalTime;
      saveState();
      renderScheduleEditor();
      renderMap();
    });
    stopPassField.appendChild(sel);
    fields.appendChild(stopPassField);
  }

  // Arrival time (not first station)
  if (idx > 0) {
    fields.appendChild(buildTimeField('着', stop.arrivalTime, v => {
      stop.arrivalTime = v;
      if (stop.stopMode !== 'stop') stop.departureTime = v;
      saveState();
      renderScheduleEditor();
    }));
  }

  // Departure time (not passing, not last)
  if (stop.stopMode === 'stop' && !isLast) {
    fields.appendChild(buildTimeField('発', stop.departureTime, v => {
      stop.departureTime = v;
      saveState();
      renderScheduleEditor();
    }));
  } else if (isLast) {
    fields.appendChild(buildTimeField('折返し発', stop.departureTime, v => {
      stop.departureTime = v;
      // Update repeat interval suggestion
      if (idx > 0) {
        const firstStop = findStopAtIndex(train, 0);
        if (firstStop) {
          const suggested = stop.departureTime - firstStop.arrivalTime;
          if (suggested > 0) {
            // Gentle hint – don't override user setting
          }
        }
      }
      saveState();
      renderScheduleEditor();
    }));
  }

  container.appendChild(fields);
}

// ----------------------------------------------------------------
// Junction stop render
// ----------------------------------------------------------------
function renderJunctionStop(container, train, node, idx, route) {
  const stop = findOrCreateStop(train, node);

  const n = nodeMap[node.nodeKey];
  const exits = n ? n.trackIds.length - 1 : 0;

  const title = document.createElement('div');
  title.className = 'sched-title';
  title.innerHTML = `
    <i class="fa-solid fa-code-branch" style="color:#f59e0b;font-size:12px"></i>
    分岐点 (${node.x}, ${node.y})
    <span class="badge badge-amber">分岐</span>
  `;
  container.appendChild(title);

  const fields = document.createElement('div');
  fields.className = 'sched-fields';

  // Arrival time
  fields.appendChild(buildTimeField('着', stop.arrivalTime, v => {
    stop.arrivalTime = v;
    saveState();
    renderScheduleEditor();
  }));

  // Direction choice
  // Compute which tracks leave this junction (excluding the incoming one)
  const dirField = document.createElement('div');
  dirField.className = 'sched-field';
  dirField.innerHTML = '<label>進行方向:</label>';

  const dirSel = document.createElement('select');
  dirSel.style.cssText = 'font-size:11px;padding:2px 4px;max-width:130px';

  // Find exits from junction
  const prevNode = idx > 0 ? route[idx - 1] : null;
  const incomingTrackId = prevNode ? getTrackBetween(prevNode, node) : null;
  const availExits      = incomingTrackId
    ? getExits(node.x, node.y, incomingTrackId)
    : (n ? n.trackIds.map(tid => {
        const t = state.tracks.find(tr => tr.id === tid);
        if (!t) return null;
        return { trackId: tid,
          toX: t.x1 === node.x && t.y1 === node.y ? t.x2 : t.x1,
          toY: t.x1 === node.x && t.y1 === node.y ? t.y2 : t.y1 };
      }).filter(Boolean) : []);

  // Find straight exit
  let straightExit = null;
  if (prevNode && incomingTrackId) {
    const prevTrack = state.tracks.find(tr => tr.id === incomingTrackId);
    if (prevTrack) {
      const fromX = prevTrack.x1 === node.x && prevTrack.y1 === node.y ? prevTrack.x2 : prevTrack.x1;
      const fromY = prevTrack.y1 === node.y ? prevTrack.y2 : prevTrack.y1;
      straightExit = getStraightExit(fromX, fromY, node.x, node.y, availExits);
    }
  }

  availExits.forEach((ex, ei) => {
    const isStraight = ex === straightExit;
    const opt = document.createElement('option');
    opt.value = isStraight ? 'straight' : `branch_${ei}`;
    opt.textContent = isStraight
      ? `直進 → (${ex.toX},${ex.toY})`
      : `分岐 → (${ex.toX},${ex.toY})`;
    if (stop.direction === opt.value || (!stop.direction && isStraight)) opt.selected = true;
    dirSel.appendChild(opt);
  });

  dirSel.addEventListener('change', () => {
    stop.direction = dirSel.value;
    saveState();
    renderScheduleEditor();
    renderMap();
  });

  dirField.appendChild(dirSel);
  fields.appendChild(dirField);
  container.appendChild(fields);
}

// ----------------------------------------------------------------
// Time field builder
// ----------------------------------------------------------------
function buildTimeField(label, value, onChange) {
  const field = document.createElement('div');
  field.className = 'sched-field';

  const lbl = document.createElement('label');
  lbl.textContent = label + ':';
  field.appendChild(lbl);

  const group = document.createElement('div');
  group.className = 'time-input-group';

  const hSel = document.createElement('select');
  hSel.style.cssText = 'width:52px;font-size:11px;padding:2px 4px';
  const mSel = document.createElement('select');
  mSel.style.cssText = 'width:52px;font-size:11px;padding:2px 4px';

  populateTimeSelect(hSel, 47);
  populateTimeSelect(mSel, 59);

  const totalMin = value || 0;
  hSel.value = Math.floor(totalMin / 60);
  mSel.value = totalMin % 60;

  const update = () => {
    const v = parseInt(hSel.value) * 60 + parseInt(mSel.value);
    onChange(v);
  };
  hSel.addEventListener('change', update);
  mSel.addEventListener('change', update);

  const colon = document.createElement('span');
  colon.textContent = ':';
  colon.style.fontWeight = '700';

  group.appendChild(hSel);
  group.appendChild(colon);
  group.appendChild(mSel);
  field.appendChild(group);
  return field;
}

// ----------------------------------------------------------------
// Travel time row between nodes
// ----------------------------------------------------------------
function buildTravelTimeRow(fromNode, toNode) {
  const row = document.createElement('div');
  row.className = 'sched-row';
  row.style.marginBottom = '2px';

  const lineCol = document.createElement('div');
  lineCol.className = 'sched-line-col';
  const vline = document.createElement('div');
  vline.className = 'sched-vline';
  lineCol.appendChild(vline);
  row.appendChild(lineCol);

  const content = document.createElement('div');
  content.style.cssText = 'flex:1;padding:0 0 2px 8px;display:flex;align-items:center;gap:6px';

  // Compute travel time
  const track = state.tracks.find(tr =>
    ((tr.x1 === fromNode.x && tr.y1 === fromNode.y && tr.x2 === toNode.x && tr.y2 === toNode.y) ||
     (tr.x2 === fromNode.x && tr.y2 === fromNode.y && tr.x1 === toNode.x && tr.y1 === toNode.y))
  );
  const mins = track
    ? trackTravelTime(track).toFixed(1)
    : (gridDist(fromNode.x, fromNode.y, toNode.x, toNode.y) * state.travelTimePerGrid).toFixed(1);

  content.innerHTML = `
    <i class="fa-solid fa-arrow-down" style="color:#9ca3af;font-size:10px"></i>
    <span class="text-muted" style="font-size:11px">所要時間: <strong>${mins}分</strong></span>
  `;
  row.appendChild(content);
  return row;
}

// ----------------------------------------------------------------
// Route building helpers
// ----------------------------------------------------------------

/**
 * Build the full ordered route for a train (outbound + inbound).
 * Returns flat array of {type, x, y, stationId?, nodeKey, platformIndex?}
 */
function buildFullRoute(train, jChoices) {
  if (!train.originStationId) return [];

  const originStation = state.stations.find(s => s.id === train.originStationId);
  if (!originStation) return [];

  // Find an endpoint of the origin station that has a track attached
  const eps = stationEndpoints(originStation);
  let startEp = null;
  for (const ep of eps) {
    const n = nodeMap[nk(ep.x, ep.y)];
    if (n && n.trackIds.length > 0) { startEp = ep; break; }
  }
  if (!startEp) {
    // No tracks from origin – just return origin
    return [{ type: 'station', x: originStation.gridX, y: originStation.gridY,
              stationId: originStation.id, nodeKey: nk(originStation.gridX, originStation.gridY),
              platformIndex: 0 }];
  }

  // Trace outbound route
  const outbound = traceRoute(startEp.x, startEp.y, null, jChoices, originStation.id);

  // For inbound (return trip), trace from last station back
  const lastNode = outbound[outbound.length - 1];
  let inbound = [];
  if (lastNode && lastNode.type === 'station' && lastNode.stationId !== train.originStationId) {
    const lastSt = state.stations.find(s => s.id === lastNode.stationId);
    if (lastSt) {
      const returnEps = stationEndpoints(lastSt);
      let returnStartEp = null;
      for (const ep of returnEps) {
        const n = nodeMap[nk(ep.x, ep.y)];
        if (n && n.trackIds.length > 0) { returnStartEp = ep; break; }
      }
      if (returnStartEp) {
        // Trace return route (junctions reversed)
        const revChoices = reverseJunctionChoices(jChoices);
        inbound = traceRoute(returnStartEp.x, returnStartEp.y, null, revChoices, lastSt.id);
        // Tag inbound nodes
        inbound = inbound.map(n => ({ ...n, inbound: true }));
      }
    }
  }

  return [...outbound, ...inbound];
}

/**
 * Trace a route from (startX, startY) until a dead end or station.
 * Returns array of route nodes (includes the starting station node).
 */
function traceRoute(startX, startY, prevTrackId, jChoices, startStationId) {
  const nodes = [];
  const visited = new Set();

  // Determine the platform index for a station endpoint
  function getPlatformIndex(x, y, stId) {
    const s = state.stations.find(s => s.id === stId);
    if (!s) return 0;
    const ep = stationEndpoints(s).find(e => e.x === x && e.y === y);
    return ep ? ep.platformIndex : 0;
  }

  // Push starting station
  nodes.push({
    type: 'station',
    x: startX, y: startY,
    stationId: startStationId,
    nodeKey: nk(startX, startY),
    platformIndex: getPlatformIndex(startX, startY, startStationId),
  });

  // Move off the starting endpoint
  const startNode = nodeMap[nk(startX, startY)];
  if (!startNode || startNode.trackIds.length === 0) return nodes;

  const firstTrackId = prevTrackId
    ? startNode.trackIds.find(id => id !== prevTrackId)
    : startNode.trackIds[0];
  if (!firstTrackId) return nodes;

  const firstTrack = state.tracks.find(t => t.id === firstTrackId);
  if (!firstTrack) return nodes;

  const ft_forward = (firstTrack.x1 === startX && firstTrack.y1 === startY);
  let curX = ft_forward ? firstTrack.x2 : firstTrack.x1;
  let curY = ft_forward ? firstTrack.y2 : firstTrack.y1;
  let incomingTrackId = firstTrackId;

  for (let safety = 0; safety < 500; safety++) {
    const key = nk(curX, curY);
    if (visited.has(key)) break;
    visited.add(key);

    // Is it a station endpoint?
    const atStation = stationAtEndpoint(curX, curY);
    if (atStation && atStation.id !== startStationId) {
      nodes.push({
        type: 'station',
        x: curX, y: curY,
        stationId: atStation.id,
        nodeKey: key,
        platformIndex: getPlatformIndex(curX, curY, atStation.id),
      });
      break;
    }

    const exits = getExits(curX, curY, incomingTrackId);

    if (exits.length === 0) {
      // Dead end (not a station)
      nodes.push({ type: 'endpoint', x: curX, y: curY, nodeKey: key });
      break;
    }

    if (exits.length === 1) {
      // Simple passthrough
      const ex = exits[0];
      incomingTrackId = ex.trackId;
      curX = ex.toX; curY = ex.toY;
    } else {
      // Junction: record it and choose direction
      nodes.push({ type: 'junction', x: curX, y: curY, nodeKey: key });

      const chosen = chooseJunctionExit(curX, curY, incomingTrackId, exits, jChoices[key] || 'straight');
      if (!chosen) break;
      incomingTrackId = chosen.trackId;
      curX = chosen.toX; curY = chosen.toY;
    }
  }

  return nodes;
}

function chooseJunctionExit(curX, curY, incomingTrackId, exits, choice) {
  const prevTrack = state.tracks.find(t => t.id === incomingTrackId);
  if (!prevTrack) return exits[0];
  const fromX = prevTrack.x1 === curX && prevTrack.y1 === curY ? prevTrack.x2 : prevTrack.x1;
  const fromY = prevTrack.x1 === curX && prevTrack.y1 === curY ? prevTrack.y2 : prevTrack.y1;

  const straight = getStraightExit(fromX, fromY, curX, curY, exits);

  if (choice === 'straight') return straight || exits[0];
  // Branch: any exit that is NOT straight
  const branch = exits.find(ex => ex !== straight);
  return branch || exits[0];
}

function reverseJunctionChoices(jChoices) {
  // On return trip, 'straight' remains 'straight', branches swap
  // (simple heuristic: keep same choices)
  return { ...jChoices };
}

// ----------------------------------------------------------------
// Stop CRUD helpers
// ----------------------------------------------------------------
function findOrCreateStop(train, node) {
  let stop = train.stops.find(s =>
    s.type === node.type &&
    (node.type === 'station' ? s.stationId === node.stationId : s.nodeKey === node.nodeKey)
  );
  if (!stop) {
    stop = node.type === 'station'
      ? { type: 'station', stationId: node.stationId,
          stopMode: 'stop', arrivalTime: 0, departureTime: 3,
          platform: node.platformIndex || 0 }
      : { type: 'junction', nodeKey: node.nodeKey,
          arrivalTime: 0, direction: 'straight' };
    train.stops.push(stop);
    saveState();
  }
  return stop;
}

function findStopAtIndex(train, idx) {
  const jChoices = getJunctionChoicesFromStops(train.stops);
  const route    = buildFullRoute(train, jChoices);
  if (!route[idx]) return null;
  return findOrCreateStop(train, route[idx]);
}

function getJunctionChoicesFromStops(stops) {
  const choices = {};
  for (const s of stops) {
    if (s.type === 'junction') choices[s.nodeKey] = s.direction || 'straight';
  }
  return choices;
}

/**
 * Sync train.stops array to match current route:
 * - Remove orphaned stops
 * - Keep existing stops that match route nodes
 * - Auto-fill times based on travel time
 */
function syncStopsToRoute(train, route) {
  const synced = [];
  let timeCursor = 0;

  for (let i = 0; i < route.length; i++) {
    const node = route[i];
    const existing = train.stops.find(s =>
      s.type === node.type &&
      (node.type === 'station' ? s.stationId === node.stationId : s.nodeKey === node.nodeKey)
    );

    if (node.type === 'station') {
      if (existing) {
        // Preserve but ensure arrival >= timeCursor
        if (i > 0 && existing.arrivalTime < timeCursor) {
          existing.arrivalTime  = Math.round(timeCursor);
          if (existing.departureTime < existing.arrivalTime)
            existing.departureTime = existing.arrivalTime + 3;
        }
        timeCursor = existing.departureTime || existing.arrivalTime;
        synced.push(existing);
      } else {
        const arr = Math.round(timeCursor);
        const dep = i === route.length - 1 ? arr + 5 : arr + 3;
        const stop = {
          type: 'station', stationId: node.stationId,
          stopMode: 'stop',
          arrivalTime: arr, departureTime: dep,
          platform: node.platformIndex || 0,
        };
        synced.push(stop);
        timeCursor = dep;
      }
    } else if (node.type === 'junction') {
      if (existing) {
        if (existing.arrivalTime < timeCursor) existing.arrivalTime = Math.round(timeCursor);
        synced.push(existing);
        timeCursor = existing.arrivalTime;
      } else {
        const stop = {
          type: 'junction', nodeKey: node.nodeKey,
          arrivalTime: Math.round(timeCursor), direction: 'straight',
        };
        synced.push(stop);
      }
    }

    // Add travel time to next node
    if (i < route.length - 1) {
      const next = route[i + 1];
      const track = state.tracks.find(tr =>
        ((tr.x1 === node.x && tr.y1 === node.y && tr.x2 === next.x && tr.y2 === next.y) ||
         (tr.x2 === node.x && tr.y2 === node.y && tr.x1 === next.x && tr.y1 === next.y))
      );
      const mins = track
        ? trackTravelTime(track)
        : gridDist(node.x, node.y, next.x, next.y) * state.travelTimePerGrid;
      timeCursor += mins;
    }
  }

  train.stops = synced;
}

/**
 * Get the track ID between two adjacent route nodes.
 */
function getTrackBetween(nodeA, nodeB) {
  const t = state.tracks.find(tr =>
    ((tr.x1 === nodeA.x && tr.y1 === nodeA.y && tr.x2 === nodeB.x && tr.y2 === nodeB.y) ||
     (tr.x2 === nodeA.x && tr.y2 === nodeA.y && tr.x1 === nodeB.x && tr.y1 === nodeB.y))
  );
  return t ? t.id : null;
}

</script>

<script>
/* ================================================================
   PART 6: SIMULATION ENGINE
================================================================ */

// ----------------------------------------------------------------
// Simulation state per active train instance
// ----------------------------------------------------------------
// Each instance:
// {
//   trainId, instanceIndex,
//   cycleStart: minutes (departure time of first stop in this cycle),
//   phase: 'outbound'|'inbound'|'waiting',
//   routeNodes: [...],  // flattened route
//   segmentIndex: 0,    // index into routeSegments
//   routeSegments: [{fromNode, toNode, departMinute, arriveMinute}],
//   posGX, posGY,       // current grid position (float)
//   status: 'running'|'waiting'|'stopped',
//   statusText: '',
//   nextStopName: '',
// }

let simInstances = [];

// ----------------------------------------------------------------
// Setup simulation
// ----------------------------------------------------------------
function setupSimulation() {
  simInstances = [];

  for (const train of state.trains) {
    const jChoices = getJunctionChoicesFromStops(train.stops);
    const route    = buildFullRoute(train, jChoices);
    if (!route.length) continue;

    // Build segments from stops
    const segments = buildRouteSegments(train, route);
    if (!segments.length) continue;

    // One instance per train (it will repeat)
    simInstances.push({
      trainId:       train.id,
      route,
      segments,
      jChoices,
      cycleOffset:   0,  // minutes offset for this cycle
      status:        'waiting',
      statusText:    '開始前',
      nextStopName:  '',
      posGX:         route[0].x,
      posGY:         route[0].y,
    });
  }
}

/**
 * Build flat segment list:
 * [{ fromX, fromY, toX, toY, depart, arrive }]
 * depart / arrive are in minutes from midnight.
 */
function buildRouteSegments(train, route) {
  if (!train.stops.length) return [];

  const segments = [];

  for (let i = 0; i + 1 < route.length; i++) {
    const nodeA = route[i];
    const nodeB = route[i + 1];

    const stopA = train.stops.find(s =>
      s.type === nodeA.type &&
      (nodeA.type === 'station' ? s.stationId === nodeA.stationId : s.nodeKey === nodeA.nodeKey)
    );
    const stopB = train.stops.find(s =>
      s.type === nodeB.type &&
      (nodeB.type === 'station' ? s.stationId === nodeB.stationId : s.nodeKey === nodeB.nodeKey)
    );

    if (!stopA || !stopB) continue;

    const depart  = (stopA.type === 'station' && stopA.stopMode === 'stop')
      ? (stopA.departureTime ?? stopA.arrivalTime)
      : stopA.arrivalTime;
    const arrive  = stopB.arrivalTime;

    segments.push({
      fromX: nodeA.x, fromY: nodeA.y,
      toX:   nodeB.x, toY:   nodeB.y,
      depart, arrive,
    });
  }
  return segments;
}

// ----------------------------------------------------------------
// Tick: advance simulation by deltaSeconds
// ----------------------------------------------------------------
function tickSimulation(deltaSeconds) {
  if (!state.sim.running) return;

  const deltaMins   = (deltaSeconds * state.sim.speed) / 60;
  state.sim.currentTime += deltaSeconds * state.sim.speed;

  // Wrap at 48h
  if (state.sim.currentTime > 48 * 3600) state.sim.currentTime -= 48 * 3600;

  const nowMin = state.sim.currentTime / 60;

  // Update each instance
  for (const inst of simInstances) {
    updateInstance(inst, nowMin);
  }

  trainPositions = simInstances
    .filter(inst => inst.status !== 'waiting' || inst.visible)
    .map(inst => {
      const train = state.trains.find(t => t.id === inst.trainId);
      return {
        trainId:   inst.trainId,
        gx:        inst.posGX,
        gy:        inst.posGY,
        color:     train ? train.color : '#888',
        name:      train ? train.name : '',
        status:    inst.status,
      };
    });

  updateSimUI(nowMin);
  renderMap();
}

/**
 * Get the dwell period [arriveMin, departMin] for the TO node of a segment.
 */
function segmentDwell(train, seg) {
  const stop = train.stops.find(s => {
    if (s.type === 'station') {
      const st = state.stations.find(st2 => st2.id === s.stationId);
      if (!st) return false;
      const eps = stationEndpoints(st);
      return eps.some(ep => ep.x === seg.toX && ep.y === seg.toY);
    }
    if (s.type === 'junction') {
      const { x, y } = parseNk(s.nodeKey);
      return x === seg.toX && y === seg.toY;
    }
    return false;
  });
  if (!stop) return null;
  const arr = stop.arrivalTime ?? seg.arrive;
  const dep = stop.type === 'station' && stop.stopMode === 'stop'
    ? (stop.departureTime ?? arr) : arr;
  return { arr, dep };
}

/**
 * Update a single train instance position at nowMin.
 * Handles repeating by computing effective time within the cycle.
 */
function updateInstance(inst, nowMin) {
  const train = state.trains.find(t => t.id === inst.trainId);
  if (!train || !inst.segments.length) return;

  const cycleLen   = train.repeatInterval; // minutes
  const firstDepart = inst.segments[0].depart;
  const lastArrive  = inst.segments[inst.segments.length - 1].arrive;

  // Determine current cycle index
  const elapsed    = nowMin - firstDepart;
  let   cycleIndex = 0;
  let   cycleTime  = nowMin;

  if (elapsed >= 0) {
    cycleIndex = Math.floor(elapsed / cycleLen);
    cycleTime  = firstDepart + (elapsed % cycleLen);
  }

  inst.cycleIndex = cycleIndex;

  // Find which segment we're in
  const lastStop = train.stops[train.stops.length - 1];
  const lastDep  = (lastStop && lastStop.departureTime != null) ? lastStop.departureTime : lastArrive;

  // In-transit?
  for (const seg of inst.segments) {
    if (cycleTime >= seg.depart && cycleTime <= seg.arrive) {
      // Interpolate position
      const t   = seg.arrive > seg.depart
        ? (cycleTime - seg.depart) / (seg.arrive - seg.depart)
        : 1;
      inst.posGX  = seg.fromX + (seg.toX - seg.fromX) * t;
      inst.posGY  = seg.fromY + (seg.toY - seg.fromY) * t;
      inst.status = 'running';
      inst.visible = true;

      // Next stop name
      const routeNode = inst.route.find(n => n.x === seg.toX && n.y === seg.toY);
      if (routeNode && routeNode.type === 'station') {
        const st = state.stations.find(s => s.id === routeNode.stationId);
        inst.nextStopName = st ? st.name : '';
      }
      inst.statusText = '走行中';
      return;
    }
  }

  // Dwelling at a station/junction?
  for (const seg of inst.segments) {
    const dwell = segmentDwell(train, seg);
    if (dwell && cycleTime >= dwell.arr && cycleTime < dwell.dep) {
      inst.posGX  = seg.toX;
      inst.posGY  = seg.toY;
      inst.status = 'stopped';
      inst.visible = true;
      const atSt = stationAtEndpoint(seg.toX, seg.toY);
      inst.statusText = atSt ? `${atSt.name}に停車中` : '停車中';
      inst.nextStopName = '';
      return;
    }
  }

  // Last station folding dwell
  const lastSeg   = inst.segments[inst.segments.length - 1];
  const lastDwell = segmentDwell(train, lastSeg);
  if (lastDwell && cycleTime >= lastDwell.arr && cycleTime < lastDwell.dep) {
    inst.posGX   = lastSeg.toX;
    inst.posGY   = lastSeg.toY;
    inst.status  = 'stopped';
    inst.visible  = true;
    inst.statusText = '折り返し待ち';
    return;
  }

  // Waiting (before first departure in this cycle, or after last)
  if (cycleTime < firstDepart) {
    inst.posGX   = inst.segments[0].fromX;
    inst.posGY   = inst.segments[0].fromY;
    inst.status  = 'waiting';
    inst.visible  = true;
    inst.statusText = '発車待ち';
    inst.nextStopName = '';
  } else {
    // After last departure – hide until next cycle
    inst.visible  = false;
    inst.status  = 'waiting';
    inst.statusText = '運行終了';
  }
}

// ----------------------------------------------------------------
// Simulation controls
// ----------------------------------------------------------------
function buildSpeedButtons() {
  const group = document.getElementById('speed-group');
  group.innerHTML = '';
  for (const spd of SPEED_STEPS) {
    const btn = document.createElement('button');
    btn.className  = 'speed-btn' + (state.sim.speed === spd ? ' active' : '');
    btn.textContent = `${spd}x`;
    btn.addEventListener('click', () => {
      state.sim.speed = spd;
      document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === `${spd}x`);
      });
    });
    group.appendChild(btn);
  }
}

// Populate start time selects
(function initSimTimeSelects() {
  const h = document.getElementById('sim-start-h');
  const m = document.getElementById('sim-start-m');
  populateTimeSelect(h, 47);
  populateTimeSelect(m, 59);
  h.value = 0; m.value = 0;
})();

document.getElementById('btn-set-time').addEventListener('click', () => {
  const h = parseInt(document.getElementById('sim-start-h').value) || 0;
  const m = parseInt(document.getElementById('sim-start-m').value) || 0;
  state.sim.currentTime = (h * 60 + m) * 60;
  updateSimTimeDisplay();
  setupSimulation();
  renderMap();
  updateSimUI(state.sim.currentTime / 60);
});

document.getElementById('btn-play').addEventListener('click', () => {
  if (!state.sim.running) {
    state.sim.running = true;
    state.sim.lastTs  = null;
    setupSimulation();
    document.getElementById('btn-play').innerHTML = '<i class="fa-solid fa-pause"></i>';
    requestAnimationFrame(simLoop);
  } else {
    state.sim.running = false;
    document.getElementById('btn-play').innerHTML = '<i class="fa-solid fa-play"></i>';
  }
});

document.getElementById('btn-stop').addEventListener('click', () => {
  state.sim.running   = false;
  state.sim.currentTime = 0;
  trainPositions      = [];
  simInstances        = [];
  document.getElementById('btn-play').innerHTML = '<i class="fa-solid fa-play"></i>';
  updateSimTimeDisplay();
  renderMap();
  updateSimUI(0);
});

// ----------------------------------------------------------------
// Animation loop
// ----------------------------------------------------------------
function simLoop(timestamp) {
  if (!state.sim.running) return;
  if (state.sim.lastTs != null) {
    const delta = (timestamp - state.sim.lastTs) / 1000; // real seconds
    tickSimulation(Math.min(delta, 0.2)); // cap to avoid jumps
  }
  state.sim.lastTs = timestamp;
  requestAnimationFrame(simLoop);
}

function updateSimTimeDisplay() {
  const s = Math.floor(state.sim.currentTime);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  document.getElementById('sim-time-display').textContent =
    `${h}:${String(m).padStart(2, '0')}`;
}

// ----------------------------------------------------------------
// Simulation tab UI table
// ----------------------------------------------------------------
function updateSimUI(nowMin) {
  updateSimTimeDisplay();

  const tbody = document.getElementById('sim-train-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  for (const inst of simInstances) {
    const train = state.trains.find(t => t.id === inst.trainId);
    if (!train) continue;

    const tr = document.createElement('tr');

    // Color + name
    const tdName = document.createElement('td');
    tdName.innerHTML = `
      <span style="display:inline-block;width:10px;height:10px;
        border-radius:50%;background:${train.color};margin-right:5px"></span>
      ${train.name}
    `;

    // Status
    const tdStatus = document.createElement('td');
    const badge = inst.status === 'running' ? 'badge-blue'
                : inst.status === 'stopped' ? 'badge-green' : 'badge-gray';
    tdStatus.innerHTML = `<span class="badge ${badge}">${inst.statusText || '—'}</span>`;

    // Position
    const tdPos = document.createElement('td');
    tdPos.textContent = `(${inst.posGX?.toFixed(1)}, ${inst.posGY?.toFixed(1)})`;

    // Next stop
    const tdNext = document.createElement('td');
    tdNext.textContent = inst.nextStopName || '—';

    tr.appendChild(tdName);
    tr.appendChild(tdStatus);
    tr.appendChild(tdPos);
    tr.appendChild(tdNext);
    tbody.appendChild(tr);
  }
}

</script>

<script>
/* ================================================================
   PART 7: TAB SWITCHING, INIT, INTEGRATION
================================================================ */

// ----------------------------------------------------------------
// Tab switching
// ----------------------------------------------------------------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    setActiveTab(tab);
  });
});

function setActiveTab(tab) {
  activeTab = tab;

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  // Panels
  document.querySelectorAll('.tab-panel').forEach(p => {
    const panelTab = p.id.replace('panel-', '');
    p.classList.toggle('active', panelTab === tab);
  });

  // Cancel any active modes when switching
  exitPlacingMode();
  if (tab !== 'track') { drawStart = null; }
  selectTrack(null);

  // Tab-specific setup
  if (tab === 'station') {
    renderStationTab();
    canvas.className = '';
  }
  if (tab === 'track') {
    drawStart = null;
    showTrackError('');
    renderTrackTab();
    setTrackMode('draw');
  }
  if (tab === 'timetable') {
    renderTrainList();
    renderScheduleEditor();
    canvas.className = '';
  }
  if (tab === 'simulation') {
    buildSpeedButtons();
    setupSimulation();
    canvas.className = '';
    renderMap();
    updateSimUI(state.sim.currentTime / 60);
  }

  renderMap();
}

// ----------------------------------------------------------------
// INIT
// ----------------------------------------------------------------
function init() {
  // Load from localStorage
  loadState();
  recomputeNodeMap();

  // Canvas resize
  resizeCanvas();

  // Set initial viewport (centered or default)
  centerViewport();

  // Travel time input sync
  document.getElementById('travel-time-input').value = state.travelTimePerGrid;

  // Speed buttons
  buildSpeedButtons();

  // Render first tab (station)
  renderStationTab();
  renderMap();

  // Handle orientation / resize changes
  window.addEventListener('resize', () => {
    resizeCanvas();
    renderMap();
  });

  // Bottom panel resize observer (for layout changes)
  const resizeObs = new ResizeObserver(() => {
    resizeCanvas();
    renderMap();
  });
  resizeObs.observe(document.getElementById('bottom-panel'));

  // Sync stationCounter to avoid name collisions
  if (state.stations.length > 0) {
    const nums = state.stations
      .map(s => {
        const m = s.name.match(/^駅(\d+)$/);
        return m ? parseInt(m[1]) : 0;
      })
      .filter(n => n > 0);
    if (nums.length) stationCounter = Math.max(...nums) + 1;
  }

  console.log('[RailSim] Initialized.',
    state.stations.length, 'stations,',
    state.tracks.length, 'tracks,',
    state.trains.length, 'trains');
}

// Run on DOMContentLoaded (already loaded since this is inline)
init();

</script>
